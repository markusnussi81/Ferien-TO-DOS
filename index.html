  <style>
    body { 
      background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 50%, #fef08a 100%); 
      margin: 0; padding: 0; font-family: 'Inter', sans-serif; overflow: hidden; 
    }
    
    #loading { display: flex; flex-direction: column; height: 100vh; width: 100vw; align-items: center; justify-content: center; color: #7c3aed; font-weight: bold; gap: 1rem; }
    .spinner { border: 4px solid rgba(124, 58, 237, 0.2); border-top: 4px solid #7c3aed; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    @keyframes checkPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); color: #8b5cf6; }
      100% { transform: scale(1); }
    }
    .animate-check { animation: checkPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    
    @keyframes slideDownDone {
      0% { opacity: 0; transform: translateY(-20px) scale(0.98); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    .animate-slide-down-done { animation: slideDownDone 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

    @keyframes slideUpOpen {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .animate-slide-up-open { animation: slideUpOpen 0.3s ease-out forwards; }

    @keyframes dropDown {
      0% { opacity: 0; transform: translateY(-50px) scale(0.95); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    .animate-drop-down { animation: dropDown 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

    @keyframes slideIn {
      0% { opacity: 0; transform: translateX(20px); }
      100% { opacity: 1; transform: translateX(0); }
    }
    .animate-slide-in { animation: slideIn 0.3s ease-out forwards; }

    /* --- DER iOS KALENDER HACK (Kugelsicher) --- */
    .date-wrapper { position: relative; display: flex; align-items: center; overflow: hidden; }
    .date-input-native {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 10;
      -webkit-appearance: none; appearance: none; background: transparent; border: none;
    }
    .date-input-native::-webkit-calendar-picker-indicator {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      width: 100%; height: 100%; margin: 0; padding: 0; opacity: 0; cursor: pointer;
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #64748b; }
  </style>
</head>

      const [localRegion, setLocalRegion] = useState('');
      const [weatherCache, setWeatherCache] = useState({});

      const generateId = () => Math.random().toString(36).substr(2, 9);

      useEffect(() => {
        const unsubFolders = onSnapshot(getCol('folders'), 
          (snap) => {
            const loadedFolders = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            setFolders(loadedFolders);
            if (loadedFolders.length > 0 && !activeFolderId) {
              setActiveFolderId(loadedFolders[0].id);
            }
            setIsLoading(false);
          },
          (err) => { console.error("Fehler Folders:", err); setIsLoading(false); }
        );

        const unsubLists = onSnapshot(getCol('lists'), (snap) => setLists(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
        const unsubItems = onSnapshot(getCol('items'), (snap) => setItems(snap.docs.map(d => ({ id: d.id, ...d.data() }))));

        return () => { unsubFolders(); unsubLists(); unsubItems(); };
      }, [activeFolderId]);

      useEffect(() => {
        if (activeFolderId) {
          const folderLists = lists.filter(l => l.folderId === activeFolderId);
          if (folderLists.length > 0 && !folderLists.find(l => l.id === activeListId)) {
            setActiveListId(folderLists[0].id);
          } else if (folderLists.length === 0) {
            setActiveListId(null);
          }
          const currentFolder = folders.find(f => f.id === activeFolderId);
          setLocalRegion(currentFolder?.region || '');
        }
      }, [activeFolderId, lists, folders]);

      useEffect(() => {
        const handleClickOutside = () => { setOpenMenuId(null); setSortMenuOpen(false); };
        document.addEventListener('click', handleClickOutside);
        return () => document.removeEventListener('click', handleClickOutside);
      }, []);

      useEffect(() => {
        const fetchWeather = async () => {
           const activeFolder = folders.find(f => f.id === activeFolderId);
           if (!activeFolder || !activeFolder.region) return;
           
           const regionName = activeFolder.region.trim();
           if (!regionName || weatherCache[regionName]) return; 

           setWeatherCache(prev => ({ ...prev, [regionName]: 'loading' }));

           try {
             const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(regionName)}&count=1&language=de`);
             const geoData = await geoRes.json();
             if (!geoData.results || geoData.results.length === 0) {
                 setWeatherCache(prev => ({ ...prev, [regionName]: 'error' })); return;
             }
             const { latitude, longitude } = geoData.results[0];
             const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`);
             const weatherData = await weatherRes.json();

             const temp = Math.round(weatherData.current_weather.temperature);
             const code = weatherData.current_weather.weathercode;
             let emoji = '🌤️';
             if (code === 0) emoji = '☀️';
             else if (code >= 1 && code <= 3) emoji = '⛅';
             else if (code === 45 || code === 48) emoji = '🌫️';
             else if (code >= 51 && code <= 67) emoji = '🌧️';
             else if (code >= 71 && code <= 77) emoji = '❄️';
             else if (code >= 80 && code <= 82) emoji = '🌦️';
             else if (code >= 95 && code <= 99) emoji = '⛈️';

             setWeatherCache(prev => ({ ...prev, [regionName]: { temp, emoji } }));
           } catch (e) {
             setWeatherCache(prev => ({ ...prev, [regionName]: 'error' }));
           }
        };
        fetchWeather();
      }, [activeFolderId, folders, weatherCache]);

      const getDaysLeft = (dateStr) => {
        if (!dateStr) return null;
        const targetDate = new Date(dateStr);
        const today = new Date();
        targetDate.setHours(0,0,0,0);
        today.setHours(0,0,0,0);
        const diffTime = targetDate - today;
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        if (diffDays > 1) return `Noch ${diffDays} Tage`;
        if (diffDays === 1) return `Morgen!`;
        if (diffDays === 0) return `Heute!`;
        if (diffDays < 0) return `Vorbei`;
        return null;
      };

      const openConfirm = (message, onConfirm) => setConfirmDialog({ isOpen: true, message, onConfirm });
      const closeConfirm = () => setConfirmDialog({ isOpen: false, message: '', onConfirm: null });

      const loadDefaultsToCloud = async () => {
        openConfirm('Möchtest du alle Basis-Listen in deine Cloud pushen? (Bestehende Daten werden ergänzt)', async () => {
          setIsUploading(true);
          try {
            for (let f of defaultFolders) await setDoc(getDocRef('folders', f.id), { name: f.name, date: f.date, region: f.region || '' }, { merge: true });
            for (let l of defaultLists) await setDoc(getDocRef('lists', l.id), { folderId: l.folderId, name: l.name }, { merge: true });
            for (let i of defaultItems) await setDoc(getDocRef('items', i.id), { listId: i.listId, name: i.name, quantity: i.quantity, checkedQuantity: i.checkedQuantity, checked: i.checked }, { merge: true });
            alert("Standard-Listen erfolgreich geladen!");
          } catch (err) {
            console.error("Fehler beim Hochladen:", err); alert("Fehler beim Speichern.");
          }
          setIsUploading(false);
        });
      };

      const addFolder = async (e) => {
        e.preventDefault();
        if (!newFolderName.trim()) return;
        const newId = generateId();
        await setDoc(getDocRef('folders', newId), { name: newFolderName.trim(), date: '', region: '' });
        setNewFolderName(''); setActiveFolderId(newId); setActiveListId(null);
      };

      const deleteFolder = (folderId) => {
        openConfirm('Trip und alle Inhalte wirklich löschen?', async () => {
          await deleteDoc(getDocRef('folders', folderId));
          const listsToDelete = lists.filter(l => l.folderId === folderId);
          for (let l of listsToDelete) {
            await deleteDoc(getDocRef('lists', l.id));
            const itemsToDelete = items.filter(i => i.listId === l.id);
            for (let i of itemsToDelete) await deleteDoc(getDocRef('items', i.id));
          }
        });
      };

      const addList = async (e, folderId) => {
        e.preventDefault();
        const name = newListNames[folderId];
        if (!name?.trim()) return;
        const newId = generateId();
        await setDoc(getDocRef('lists', newId), { folderId, name: name.trim() });
        setNewListNames({ ...newListNames, [folderId]: '' }); setActiveListId(newId);
      };

      const deleteList = (listId) => {
        openConfirm('Kategorie wirklich löschen?', async () => {
          await deleteDoc(getDocRef('lists', listId));
          const itemsToDelete = items.filter(i => i.listId === listId);
          for (let item of itemsToDelete) await deleteDoc(getDocRef('items', item.id));
        });
      };

      const addItem = async (e, listId) => {
        e.preventDefault();
        const input = newItemNames[listId];
        if (!input?.trim()) return;
        const { quantity, name } = parseItemInput(input);
        const newId = generateId();
        await setDoc(getDocRef('items', newId), { listId, name: name, quantity: quantity, checkedQuantity: 0, checked: false });
        setNewItemNames({ ...newItemNames, [listId]: '' });
      };

      const deleteItem = async (itemId) => await deleteDoc(getDocRef('items', itemId));

      const updateItemQuantity = async (itemId, delta) => {
        const targetItem = items.find(i => i.id === itemId);
        if(!targetItem) return;
        const currentQty = targetItem.quantity || 1;
        const newQty = Math.max(1, currentQty + delta);
        
        let newCheckedQty = targetItem.checkedQuantity !== undefined ? targetItem.checkedQuantity : (targetItem.checked ? currentQty : 0);
        if (newCheckedQty > newQty) newCheckedQty = newQty;
        const newChecked = newQty > 0 && newCheckedQty === newQty;
        
        await setDoc(getDocRef('items', itemId), { quantity: newQty, checkedQuantity: newCheckedQty, checked: newChecked }, { merge: true });
      };

      const toggleItem = async (itemId, action = 'toggle') => {
        if (isBulkMode && action === 'toggle') {
          setSelectedItemIds(prev => prev.includes(itemId) ? prev.filter(id => id !== itemId) : [...prev, itemId]);
          return;
        } 
        
        const targetItem = items.find(i => i.id === itemId);
        if(!targetItem) return;

        const maxQty = targetItem.quantity || 1;
        let currentQty = targetItem.checkedQuantity !== undefined ? targetItem.checkedQuantity : (targetItem.checked ? maxQty : 0);
        let newChecked = targetItem.checked;

        if (action === 'toggle') {
          newChecked = !targetItem.checked;
          currentQty = newChecked ? maxQty : 0;
          if (newChecked) {
             setAnimatingItems(prev => ({ ...prev, [itemId]: true }));
             setTimeout(() => setAnimatingItems(prev => ({ ...prev, [itemId]: false })), 400);
          }
        } else if (action === 'increment') {
          if (currentQty < maxQty) currentQty++;
          newChecked = (currentQty === maxQty);
        } else if (action === 'decrement') {
          if (currentQty > 0) currentQty--;
          newChecked = (currentQty === maxQty);
        }

        await setDoc(getDocRef('items', itemId), { checked: newChecked, checkedQuantity: currentQty }, { merge: true });
      };

      const startEdit = (id, initialValue) => {
        setEditingId(id); setEditValue(initialValue); setOpenMenuId(null);
      };

      const saveEdit = async () => {
        if (!editingId) return;
        const [type, id] = editingId.split('-');
        if (editValue.trim() !== '') {
          if (type === 'app') setAppTitle(editValue.trim()); 
          else if (type === 'folder' || type === 'folder-header') {
            const folderId = type === 'folder' ? id : editingId.replace('folder-header-', '');
            await setDoc(getDocRef('folders', folderId), { name: editValue.trim() }, { merge: true });
          }
          else if (type === 'list' || type === 'list-header') {
            const listId = type === 'list' ? id : editingId.replace('list-header-', '');
            await setDoc(getDocRef('lists', listId), { name: editValue.trim() }, { merge: true });
          }
          else if (type === 'item') {
            const parsed = parseItemInput(editValue.trim());
            const targetItem = items.find(i => i.id === id);
            if (targetItem) {
               let newCheckedQty = targetItem.checkedQuantity || 0;
               if (newCheckedQty > parsed.quantity) newCheckedQty = parsed.quantity;
               let newChecked = newCheckedQty === parsed.quantity;
               await setDoc(getDocRef('items', id), { name: parsed.name, quantity: parsed.quantity, checkedQuantity: newCheckedQty, checked: newChecked }, { merge: true });
            }
          }
        }
        setEditingId(null);
      };

      const handleEditKeyDown = (e) => {
        if (e.key === 'Enter') e.target.blur(); 
        if (e.key === 'Escape') setEditingId(null);
      };

      const handleDateChange = async (folderId, newDate) => {
        await setDoc(getDocRef('folders', folderId), { date: newDate }, { merge: true });
      };

      const handleRegionBlur = async (folderId) => {
        const currentFolder = folders.find(f => f.id === folderId);
        if (currentFolder && localRegion !== (currentFolder.region || '')) {
           await setDoc(getDocRef('folders', folderId), { region: localRegion.trim() }, { merge: true });
        }
      };

      const selectEmoji = async (emoji) => {
         if (iconModal.listId) {
             await setDoc(getDocRef('lists', iconModal.listId), { icon: emoji }, { merge: true });
         }
         setIconModal({ isOpen: false, listId: null });
      };

      const reactivateAllInFolder = async (folderId) => {
        const folderListIds = lists.filter(l => l.folderId === folderId).map(l => l.id);
        const itemsToReactivate = items.filter(i => folderListIds.includes(i.listId) && i.checked);
        for (let item of itemsToReactivate) await setDoc(getDocRef('items', item.id), { checked: false, checkedQuantity: 0 }, { merge: true });
      };

      const executeTransfer = async () => {
        const { action, sourceType, sourceId } = transferModal;
        if (sourceType === 'list') {
          const listToProcess = lists.find(l => l.id === sourceId);
          if (action === 'move') {
            await setDoc(getDocRef('lists', sourceId), { folderId: targetFolderId }, { merge: true });
          } else if (action === 'copy') {
            const newListId = generateId();
            await setDoc(getDocRef('lists', newListId), { ...listToProcess, id: undefined, folderId: targetFolderId });
            const itemsToCopy = items.filter(i => i.listId === sourceId);
            for (let item of itemsToCopy) await setDoc(getDocRef('items', generateId()), { ...item, id: undefined, listId: newListId, checked: false, checkedQuantity: 0 }, { merge: true });
          }
        } 
        else if (sourceType === 'item' || sourceType === 'bulk-items') {
          const idsToProcess = Array.isArray(sourceId) ? sourceId : [sourceId];
          if (!targetListId) return;
          if (action === 'move') {
            for (let id of idsToProcess) await setDoc(getDocRef('items', id), { listId: targetListId }, { merge: true });
          } else if (action === 'copy') {
            const itemsToCopy = items.filter(i => idsToProcess.includes(i.id));
            for (let item of itemsToCopy) await setDoc(getDocRef('items', generateId()), { ...item, id: undefined, listId: targetListId, checked: false, checkedQuantity: 0 }, { merge: true });
          }
        }
        setTransferModal({ isOpen: false, action: null, sourceType: null, sourceId: null });
        setIsBulkMode(false); setSelectedItemIds([]);
      };

      const executeBulkDelete = () => {
        openConfirm(`${selectedItemIds.length} Utensilien wirklich löschen?`, async () => {
          for (let id of selectedItemIds) await deleteDoc(getDocRef('items', id));
          setIsBulkMode(false); setSelectedItemIds([]);
        });
      };
      
      const openTransferModal = (action, sourceType, sourceId) => {
        setTargetFolderId(activeFolderId);
        if (sourceType === 'item' || sourceType === 'bulk-items') {
           const availableLists = lists.filter(l => l.folderId === activeFolderId);
           setTargetListId(availableLists.length > 0 ? availableLists[0].id : '');
        } else setTargetListId('');
        setTransferModal({ isOpen: true, action, sourceType, sourceId }); setOpenMenuId(null);
      };

      const renderInlineInput = (id, containerClasses = "flex-1 min-w-0") => (
        <div className={`flex items-center gap-2 ${containerClasses}`}>
          <input autoFocus type="text" value={editValue} onChange={(e) => setEditValue(e.target.value)} onKeyDown={handleEditKeyDown} onBlur={saveEdit} onClick={(e) => e.stopPropagation()} className="bg-white border-2 border-violet-400 rounded-lg px-2 py-1 text-sm text-stone-800 outline-none w-full shadow-inner font-normal" />
        </div>
      );

      const DropdownMenu = ({ id, options }) => {
        if (openMenuId !== id) return null;
        return (
          <div className="absolute right-0 top-full mt-1 w-48 bg-white/95 backdrop-blur-md rounded-xl shadow-xl border border-stone-200 py-1 z-50">
            {options.map((opt, idx) => opt.separator ? (
                <div key={`sep-${idx}`} className="h-px bg-stone-100 my-1 w-full" />
              ) : (
                <button key={opt.label} onClick={(e) => { e.stopPropagation(); opt.action(); setOpenMenuId(null); }} className={`w-full text-left px-4 py-3 md:py-2 text-sm flex items-center gap-2 transition-colors ${opt.danger ? 'text-red-600 hover:bg-red-50' : 'text-stone-700 hover:bg-stone-50'}`}>
                  {opt.icon} {opt.label}
                </button>
            ))}
          </div>
        );
      };

      const getProgressColor = (current, max, isChecked) => {
         if (isChecked) return 'bg-stone-50/80 hover:bg-white border-transparent hover:border-stone-200';
         if (max <= 1 || current === 0) return 'bg-white hover:bg-violet-50/80 border-stone-100 hover:border-violet-200';
         const ratio = current / max;
         if (ratio <= 0.25) return 'bg-amber-50 hover:bg-amber-100 border-amber-200 shadow-sm';
         if (ratio <= 0.50) return 'bg-orange-50 hover:bg-orange-100 border-orange-200 shadow-sm';
         if (ratio <= 0.75) return 'bg-yellow-100 hover:bg-yellow-200 border-yellow-300 shadow-sm';
         return 'bg-lime-100 hover:bg-lime-200 border-lime-300 shadow-sm';
      };

      const getFolderStats = (folderId) => {
        const folderLists = lists.filter(l => l.folderId === folderId);
        const listIds = folderLists.map(l => l.id);
        const folderItems = items.filter(i => listIds.includes(i.listId));
        const total = folderItems.length;
        const done = folderItems.filter(i => i.checked).length;
        const progress = total === 0 ? 0 : Math.round((done / total) * 100);
        return { total, done, progress };
      };

      if (isLoading) return null; 

      const activeFolder = folders.find(f => f.id === activeFolderId);
      const activeLists = lists.filter(l => l.folderId === activeFolderId);
      const activeList = activeLists.find(l => l.id === activeListId) || activeLists[0];
      const currentListItems = items.filter(i => i.listId === activeList?.id);
      
      let sortedCurrentItems = [...currentListItems];
      sortedCurrentItems.sort((a, b) => {
         if (sortOption === 'alpha-asc') return a.name.localeCompare(b.name);
         if (sortOption === 'alpha-desc') return b.name.localeCompare(a.name);
         if (sortOption === 'qty-asc') return (a.quantity || 1) - (b.quantity || 1);
         if (sortOption === 'qty-desc') return (b.quantity || 1) - (a.quantity || 1);
         return 0;
      });

      const openItems = sortedCurrentItems.filter(i => !i.checked);
      const doneItems = sortedCurrentItems.filter(i => i.checked);
      const activeStats = activeFolder ? getFolderStats(activeFolder.id) : { total: 0, done: 0 };

      const handleSelectAll = () => {
         if (selectedItemIds.length === currentListItems.length) setSelectedItemIds([]); 
         else setSelectedItemIds(currentListItems.map(i => i.id)); 
      };

      return (
        <div className="h-screen w-full font-sans text-stone-800 flex flex-col md:flex-row overflow-hidden relative">
          
          <div className="md:hidden bg-gradient-to-r from-violet-700 to-fuchsia-600 text-white p-3 md:p-4 flex justify-between items-center shadow-lg z-20 shrink-0">
            <div className="flex items-center gap-2 font-bold text-lg md:text-xl flex-1 cursor-pointer">
              <Tent className="h-6 w-6 text-violet-200 shrink-0" />
              <div className="flex items-center min-w-0">
                <span className="truncate">{appTitle}</span>
                <span className="text-[9px] md:text-[10px] bg-white/20 text-white px-1.5 py-0.5 rounded ml-2 font-mono shrink-0 shadow-sm">v1.4.3</span>
              </div>
            </div>
            <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-1 hover:bg-white/20 rounded transition-colors shrink-0">
              {isSidebarOpen ? <X className="h-6 w-6" /> : <Menu className="h-6 w-6" />}
            </button>
          </div>

          <aside className={`
            ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'} 
            md:translate-x-0 transition-transform duration-300 ease-in-out
            fixed md:static top-0 left-0 h-full w-[85%] md:w-80 
            bg-white/95 backdrop-blur-md border-r border-stone-200 shadow-2xl md:shadow-none z-30 flex flex-col
          `}>
            <div className="p-6 bg-gradient-to-br from-violet-800 to-fuchsia-700 text-white hidden md:flex items-center gap-3 shrink-0 shadow-inner">
              <TreePine className="h-8 w-8 text-violet-200 flex-shrink-0 drop-shadow-md" />
              <div className="min-w-0 flex-1">
                <div className="flex items-center">
                  <h1 className="font-bold text-xl tracking-wide truncate drop-shadow-sm">{appTitle}</h1>
                  <span className="text-[10px] bg-black/20 text-white px-1.5 py-0.5 rounded ml-2 font-mono shrink-0 shadow-inner">v1.4.3</span>
                </div>
                <p className="text-violet-200 text-xs uppercase tracking-wider font-semibold flex items-center gap-1 mt-0.5 opacity-90"><Cloud className="h-3 w-3"/> Cloud Sync</p>
              </div>
            </div>

            <div className="flex-1 overflow-y-auto p-3 md:p-4 pb-24">
              <h2 className="text-[10px] font-extrabold text-stone-400 uppercase tracking-widest mb-3 md:mb-4 px-2">Geplante Reisen</h2>
              <ul className="space-y-3">
                {folders.map(folder => {
                  const stats = getFolderStats(folder.id);
                  const progress = stats.progress;
                  const isActiveFolder = activeFolderId === folder.id;
                  const folderLists = lists.filter(l => l.folderId === folder.id);

                  return (
                    <li key={folder.id}>
                      <div className={`w-full text-left rounded-2xl flex items-center justify-between transition-all duration-300 ${isActiveFolder ? 'bg-gradient-to-r from-violet-50 to-fuchsia-50 border border-violet-100 shadow-sm' : 'hover:bg-stone-50 border border-transparent'}`}>
                        <div onClick={() => { setActiveFolderId(folder.id); if (window.innerWidth < 768 && folderLists.length === 0) setIsSidebarOpen(false); }} className="flex-1 text-left px-4 py-3 flex items-center gap-3 overflow-hidden cursor-pointer">
                          <MapIcon className={`h-5 w-5 flex-shrink-0 transition-colors ${isActiveFolder ? 'text-violet-600' : 'text-stone-400'}`} />
                          <div className={`truncate font-bold flex-1 ${isActiveFolder ? 'text-violet-900' : 'text-stone-600'}`}>
                            {editingId === `folder-${folder.id}` ? renderInlineInput(`folder-${folder.id}`) : folder.name}
                          </div>
                        </div>
                        <div className="relative pr-2 shrink-0">
                          <button onClick={(e) => { e.stopPropagation(); setOpenMenuId(`menu-folder-${folder.id}`); }} className="p-2 md:p-1.5 text-stone-400 hover:text-violet-600 rounded-lg hover:bg-white/50 transition-colors"><MoreVertical className="h-5 w-5" /></button>
                          <DropdownMenu id={`menu-folder-${folder.id}`} options={[
                              { label: 'Umbenennen', icon: <Edit2 className="h-4 w-4"/>, action: () => startEdit(`folder-${folder.id}`, folder.name) },
                              { separator: true },
                              { label: 'Löschen', icon: <Trash2 className="h-4 w-4"/>, action: () => deleteFolder(folder.id), danger: true }
                            ]} />
                        </div>
                      </div>
                      
                      <div className="px-5 mt-1.5 mb-3">
                         <div className="h-1.5 w-full bg-stone-100 rounded-full overflow-hidden shadow-inner">
                           <div className={`h-full transition-all duration-700 ease-out ${progress === 100 ? 'bg-gradient-to-r from-violet-400 to-fuchsia-400' : 'bg-gradient-to-r from-amber-300 to-orange-400'}`} style={{ width: `${progress}%` }} />
                         </div>
                      </div>

                      {isActiveFolder && (
                        <div className="ml-6 pl-3 border-l-2 border-violet-100/50 mb-6">
                          <div className="space-y-1.5">
                            {folderLists.map(list => {
                              const isActiveList = activeListId === list.id;
                              return (
                                <div key={list.id} className={`group flex items-center justify-between px-3 py-2 rounded-xl cursor-pointer transition-all duration-200 ${isActiveList ? 'bg-white shadow-sm border border-violet-100/50' : 'hover:bg-white/50 text-stone-600'}`}>
                                  <div className="flex items-center gap-2.5 flex-1 overflow-hidden" onClick={() => { setActiveListId(list.id); if (window.innerWidth < 768) setIsSidebarOpen(false); }}>
                                    <span className="text-base flex-shrink-0 grayscale opacity-80 group-hover:grayscale-0 group-hover:opacity-100 transition-all">
                                        {list.icon || getCategoryEmoji(list.name)}
                                    </span>
                                    <div className={`truncate flex-1 font-medium text-sm md:text-sm ${isActiveList ? 'text-violet-800' : 'text-stone-600'}`}>
                                      {editingId === `list-${list.id}` ? renderInlineInput(`list-${list.id}`) : list.name}
                                    </div>
                                  </div>
                                  <div className="relative shrink-0 md:opacity-0 md:group-hover:opacity-100 focus-within:opacity-100 transition-opacity">
                                    <button onClick={(e) => { e.stopPropagation(); setOpenMenuId(`menu-list-${list.id}`); }} className="p-2 md:p-1 text-stone-400 hover:text-violet-600 rounded-md hover:bg-stone-100"><MoreVertical className="h-5 w-5 md:h-4 md:w-4" /></button>
                                    <DropdownMenu id={`menu-list-${list.id}`} options={[
                                        { label: 'Umbenennen', icon: <Edit2 className="h-4 w-4"/>, action: () => startEdit(`list-${list.id}`, list.name) },
                                        { separator: true },
                                        { label: 'Verschieben nach...', icon: <ArrowRightLeft className="h-4 w-4"/>, action: () => openTransferModal('move', 'list', list.id) },
                                        { label: 'Kopieren nach...', icon: <CopyIcon className="h-4 w-4"/>, action: () => openTransferModal('copy', 'list', list.id) },
                                        { separator: true },
                                        { label: 'Löschen', icon: <Trash2 className="h-4 w-4"/>, action: () => deleteList(list.id), danger: true }
                                      ]} />
                                  </div>
                                </div>
                              )
                            })}
                          </div>
                          
                          <div className="px-3 mt-3 mb-2">
                            {showListInputFor === folder.id ? (
                              <form onSubmit={(e) => { addList(e, folder.id); setShowListInputFor(null); }} className="flex items-center gap-1.5 animate-slide-in">
                                <input autoFocus type="text" placeholder="Listenname..." value={newListNames[folder.id] || ''} onChange={(e) => setNewListNames({ ...newListNames, [folder.id]: e.target.value })} className="flex-1 bg-white border border-violet-300 rounded-lg py-1.5 px-2.5 text-sm outline-none focus:ring-2 focus:ring-violet-500/30 text-stone-700 min-w-0" />
                                <button type="submit" className="p-1.5 bg-violet-500 text-white rounded-lg hover:bg-violet-600 shrink-0"><Check className="h-4 w-4"/></button>
                                <button type="button" onClick={() => setShowListInputFor(null)} className="p-1.5 bg-stone-200 text-stone-600 rounded-lg hover:bg-stone-300 shrink-0"><X className="h-4 w-4"/></button>
                              </form>
                            ) : (
                              <button onClick={() => setShowListInputFor(folder.id)} className="w-full text-left text-xs font-bold text-stone-500 hover:text-violet-600 bg-stone-50 hover:bg-violet-50 py-2.5 px-3 rounded-xl border border-dashed border-stone-300 hover:border-violet-300 transition-colors flex items-center gap-2">
                                <Plus className="h-4 w-4"/> Neue Liste erstellen
                              </button>
                            )}
                          </div>

                        </div>
                      )}
                    </li>
                  );
                })}
              </ul>

              {folders.length === 0 && <div className="text-center p-6 text-stone-400 text-sm">Noch keine Trips in deiner Cloud.</div>}
              
              <button onClick={loadDefaultsToCloud} disabled={isUploading} className="w-full text-[10px] font-bold uppercase text-stone-400 hover:text-violet-600 mt-8 flex items-center justify-center gap-1.5 transition-colors disabled:opacity-50">
                 <RotateCcw className={`h-3.5 w-3.5 ${isUploading ? 'animate-spin' : ''}`} /> Standard-Listen laden

                    )}
                  </div>
                </div>
                
                {}
                {isBulkMode && selectedItemIds.length > 0 && (
                  <div className="fixed bottom-0 left-0 md:left-80 right-0 bg-white/95 backdrop-blur-xl border-t border-stone-200 p-4 shadow-[0_-20px_40px_rgba(0,0,0,0.1)] z-40 flex justify-center gap-3 flex-wrap">
                     <button onClick={() => openTransferModal('move', 'bulk-items', selectedItemIds)} className="flex items-center gap-2 px-5 py-3 md:py-2.5 bg-stone-100 hover:bg-stone-200 text-stone-700 rounded-xl font-bold transition-all shadow-sm hover:shadow"><ArrowRightLeft className="h-4 w-4"/> Verschieben ({selectedItemIds.length})</button>
                     <button onClick={() => openTransferModal('copy', 'bulk-items', selectedItemIds)} className="flex items-center gap-2 px-5 py-3 md:py-2.5 bg-stone-100 hover:bg-stone-200 text-stone-700 rounded-xl font-bold transition-all shadow-sm hover:shadow"><CopyIcon className="h-4 w-4"/> Kopieren</button>
                     <button onClick={executeBulkDelete} className="flex items-center gap-2 px-5 py-3 md:py-2.5 bg-red-50 hover:bg-red-100 text-red-600 rounded-xl font-bold transition-all shadow-sm hover:shadow"><Trash2 className="h-4 w-4"/> Löschen</button>
                  </div>
                )}
              </>
            ) : (
              <div className="flex-1 flex flex-col items-center justify-center p-8 text-center text-stone-500 bg-white/50 m-4 rounded-3xl shadow-xl border border-white/60 backdrop-blur-sm">
                <Tent className="h-24 w-24 text-fuchsia-200 mb-6 drop-shadow-md" />
                <h2 className="text-2xl font-bold text-stone-700 mb-2">Willkommen beim CampPacker</h2>
                <p className="max-w-md mx-auto text-sm mb-4">Wähle links einen Trip an, um zu starten.</p>
              </div>
            )}
          </main>

          {}
          {confirmDialog.isOpen && (
            <div className="fixed inset-0 bg-stone-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-slide-in" onClick={closeConfirm}>
              <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden transform transition-all border border-stone-100" onClick={e => e.stopPropagation()}>
                <div className="p-8">
                  <div className="flex items-center gap-3 text-violet-500 mb-4"><AlertTriangle className="h-8 w-8" /><h3 className="text-xl font-extrabold text-stone-800">Sicher?</h3></div>
                  <p className="text-stone-600 mb-8 font-medium leading-relaxed">{confirmDialog.message}</p>
                  <div className="flex justify-end gap-3">
                    <button onClick={closeConfirm} className="px-5 py-3 md:py-2.5 text-stone-500 font-bold hover:bg-stone-100 rounded-xl transition-colors">Abbrechen</button>
                    <button onClick={() => { if(confirmDialog.onConfirm) confirmDialog.onConfirm(); closeConfirm(); }} className="px-5 py-3 md:py-2.5 bg-violet-600 hover:bg-violet-700 text-white font-bold rounded-xl transition-all shadow-md hover:shadow-lg transform hover:-translate-y-0.5">Ja, ausführen</button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {transferModal.isOpen && (
            <div className="fixed inset-0 bg-stone-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-slide-in" onClick={() => setTransferModal({isOpen: false})}>
              <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden border border-stone-100" onClick={e => e.stopPropagation()}>
                <div className="p-6 border-b border-stone-100/50 bg-stone-50/50"><h3 className="text-xl font-extrabold text-stone-800">{transferModal.action === 'move' ? 'Verschieben nach...' : 'Kopieren nach...'}</h3></div>
                <div className="p-6 space-y-5">
                  <div>
                    <label className="block text-xs font-bold text-stone-400 uppercase tracking-wider mb-2">Ziel-Trip</label>
                    <select value={targetFolderId} onChange={(e) => { setTargetFolderId(e.target.value); const folderLists = lists.filter(l => l.folderId === e.target.value); setTargetListId(folderLists.length > 0 ? folderLists[0].id : ''); }} className="w-full bg-stone-50 border border-stone-200 rounded-2xl p-4 md:p-3.5 outline-none focus:ring-4 focus:ring-violet-500/20 focus:border-violet-500 font-medium text-stone-700 transition-all shadow-inner">
                      <option value="" disabled>Bitte wählen...</option>{folders.map(f => <option key={f.id} value={f.id}>{f.name}</option>)}
                    </select>
                  </div>
                  {(transferModal.sourceType === 'item' || transferModal.sourceType === 'bulk-items') && targetFolderId && (
                    <div className="animate-slide-in">
                      <label className="block text-xs font-bold text-stone-400 uppercase tracking-wider mb-2">Ziel-Kategorie</label>
                      <select value={targetListId} onChange={(e) => setTargetListId(e.target.value)} className="w-full bg-stone-50 border border-stone-200 rounded-2xl p-4 md:p-3.5 outline-none focus:ring-4 focus:ring-violet-500/20 focus:border-violet-500 font-medium text-stone-700 transition-all shadow-inner">
                        <option value="" disabled>Bitte wählen...</option>{lists.filter(l => l.folderId === targetFolderId).map(l => ( <option key={l.id} value={l.id}>{l.name}</option> ))}
                      </select>
                    </div>
                  )}
                </div>
                <div className="p-5 bg-stone-50/80 flex justify-end gap-3 border-t border-stone-100/50">
                  <button onClick={() => setTransferModal({isOpen: false})} className="px-5 py-3 md:py-2.5 text-stone-500 font-bold hover:bg-stone-200 rounded-xl transition-colors">Abbrechen</button>
                  <button onClick={executeTransfer} disabled={transferModal.sourceType !== 'list' && !targetListId} className="px-5 py-3 md:py-2.5 bg-gradient-to-r from-violet-500 to-fuchsia-500 hover:from-violet-600 hover:to-fuchsia-600 text-white font-bold rounded-xl transition-all shadow-md hover:shadow-lg transform hover:-translate-y-0.5 disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2">Ausführen</button>
                </div>
              </div>
            </div>
          )}

          {iconModal.isOpen && (
            <div className="fixed inset-0 bg-stone-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-slide-in" onClick={() => setIconModal({ isOpen: false, listId: null })}>
              <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden border border-stone-100" onClick={e => e.stopPropagation()}>
                <div className="p-6 border-b border-stone-100/50 bg-stone-50/50 flex justify-between items-center">
                  <h3 className="text-xl font-extrabold text-stone-800">Icon auswählen</h3>
                  <button onClick={() => setIconModal({ isOpen: false, listId: null })} className="p-2 text-stone-400 hover:bg-stone-200 rounded-full transition-colors"><X className="h-5 w-5"/></button>
                </div>
                <div className="p-6 grid grid-cols-5 md:grid-cols-6 gap-3">
                  {EMOJI_OPTIONS.map(emoji => (
                    <button key={emoji} onClick={() => selectEmoji(emoji)} className="text-3xl p-2 hover:bg-violet-100 rounded-xl transition-all hover:scale-110 active:scale-95 flex items-center justify-center">
                      {emoji}
                    </button>
                  ))}
                </div>
              </div>
            </div>
          )}

          {isSidebarOpen && <div className="fixed inset-0 bg-stone-900/30 backdrop-blur-sm z-20 md:hidden" onClick={() => setIsSidebarOpen(false)} />}
        </div>
      );
    }

    const rootElement = document.getElementById("root");
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>

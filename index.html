  <meta name="mobile-web-app-capable" content="yes">
  
  <title>CampPacker</title>
  
  <!-- Tailwind CSS für das Design -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM (Version 18) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

  <!-- Babel, um den JSX Code im Browser auszuführen -->

  <style>
    /* Verhindert das Flackern beim Laden */
    body { background-color: #f4f7f4; margin: 0; padding: 0; font-family: sans-serif; overflow: hidden; }
    #loading { display: flex; height: 100vh; width: 100vw; align-items: center; justify-content: center; color: #059669; font-weight: bold; }
    /* Eigene Scrollbars für besseres App-Gefühl */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body>
  <div id="root">
    <div id="loading">CampPacker wird geladen...</div>
  </div>

  <script type="text/babel" data-type="module">
    const { useState, useEffect } = React;

    // --- ICON KOMPONENTEN (Inline SVGs) ---

      </svg>
    );

    const Tent = (p) => <IconWrapper {...p}><path d="M19 20 10 4"/><path d="m5 20 9-16"/><path d="M3 20h18"/><path d="m12 15-3 5"/><path d="m12 15 3 5"/></IconWrapper>;
    const Folder = (p) => <IconWrapper {...p}><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/></IconWrapper>;

    const X = (p) => <IconWrapper {...p}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></IconWrapper>;
    const MapIcon = (p) => <IconWrapper {...p}><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" x2="9" y1="3" y2="18"/><line x1="15" x2="15" y1="6" y2="21"/></IconWrapper>;

    const Check = (p) => <IconWrapper {...p}><path d="M20 6 9 17l-5-5"/></IconWrapper>;
    const RotateCcw = (p) => <IconWrapper {...p}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></IconWrapper>;
    const MoreVertical = (p) => <IconWrapper {...p}><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></IconWrapper>;

    const CopyIcon = (p) => <IconWrapper {...p}><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></IconWrapper>;

    const Edit2 = (p) => <IconWrapper {...p}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></IconWrapper>;
    const Clock = (p) => <IconWrapper {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></IconWrapper>;
    const AlertTriangle = (p) => <IconWrapper {...p}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></IconWrapper>;

    // --- STANDARD DATEN ---
    const createItems = (listId, names) => 
      names.map((name, index) => ({
        id: `item_${listId}_${index}`, 
        listId, 
        name, 
        checked: false 
      }));

    const defaultFolders = [
      { id: 'f_grosse', name: 'Grosse Reise', date: '' },
      { id: 'f_kleine', name: 'kleine Reise', date: '' }
    ];

    const defaultLists = [
      { id: 'l_vdr', folderId: 'f_grosse', name: 'Vor der Reise' },
      { id: 'l_ele', folderId: 'f_grosse', name: 'Elektronik' },
      { id: 'l_med', folderId: 'f_grosse', name: 'Medikamente' },
      { id: 'l_cma', folderId: 'f_grosse', name: 'Ca Ma Allgemein' },
      { id: 'l_cmh', folderId: 'f_grosse', name: 'Ca Ma Hygieneartikel' },
      { id: 'l_nla', folderId: 'f_grosse', name: 'No Le Allgemein' },
      { id: 'l_nlh', folderId: 'f_grosse', name: 'No Le Hygieneartikel' },
      { id: 'l_ess', folderId: 'f_grosse', name: 'Essen' },
      { id: 'l_wohn', folderId: 'f_grosse', name: 'Für Wohnwagen' },
      { id: 'l_kue', folderId: 'f_grosse', name: 'Küche' },
      { id: 'l_cos', folderId: 'f_grosse', name: 'Cosmo' },
      { id: 'l_3d', folderId: 'f_grosse', name: '3d druck' },
      { id: 'l_ueb', folderId: 'f_kleine', name: 'über Nacht' },
      { id: 'l_mer', folderId: 'f_kleine', name: 'Meran' }
    ];

    const defaultItems = [
      ...createItems('l_vdr', ['Mower', 'Kaffeemaschine trester leeren', 'Kühlschrank automation aus', 'Schloss laden', 'Einstiegshöcker neu 2025', 'Druckknopf küche ww kaputt 2025', 'Chlor auf sitzplatz', 'Roaming cat', 'Aussenkabel klima', 'Heringset zum in den Boden zu schrauben', 'Velos in die Garage stellen', 'Neue Spielsachen Überraschung', 'Unwichtige Karten aus Portemonnaie', 'Ausweise und kreditkarte scannen', 'Rollladen zurück', 'Ausdruck', 'Filme downloaden', 'Pool ferientimer', 'Spülchemie', 'Handyladegerät von Prius in Rav', 'Nackenkissen', 'Geschirrspülmaschine öffnen', 'Abfallsäcke entsorgen', 'Kühlschrank leeren', 'Rollläden öffnen/schliessen', 'Pflanzen giessen', 'Milch', 'Pool chloren', 'Hue Licht starten', 'Geld', 'Reservation', 'Comput ausschalten']),
      ...createItems('l_ele', ['Airpods', 'Autoladekabel', 'Doppelstecker', 'Handyladekabel', 'ipad', 'ipadladekabel', 'Levi Uhr', 'Plastik unter Teppich', 'Switch', 'Tolino', 'Tonibox und figuren levi', 'Toniebox ladekabel', 'Toniebox mit figuren Noelle', 'Watch', 'Weitere kabelrolle']),
      ...createItems('l_med', ['Algifor Kinder', 'Fiebermesser', 'ibuprofen', 'Dafalgan', 'Ohrentropfen', 'Pflaster', 'Verbandszeug', 'Zugsalbe', 'Fusspilzcreme', 'Mückenstich', 'Proto', 'Alphasteam', 'Coldpack']),
      ...createItems('l_cma', ['Unterhosen Cathrin', 'Unterhosen Markus', 'Badehose Cat', 'Badehosen Markus', 'Badetücher fürs Meer', 'Bettdecke', 'Bh', 'Brille', 'Diffuser', 'Duschtücher gross', 'Einlegesohle', 'Einlegesohlen', 'Euros', 'Flip Flop Cat', 'Flip Flop Markus', 'Gurt', 'Hut Cat', 'Isomatte Steinstrand', 'Jäckchen Cat', 'Jäckchen Markus', 'Kappe Markus', 'Kurze Hosen Cat', 'Kurze Hosen Markus', 'Ladegerät Zahnbürste', 'Lange Hose cat', 'Lange hose Markus', 'Linsen', 'Linsenwasser', 'Oberteile Cat', 'Oberteile Markus', 'Pijama / Trainer', 'Pipipads', 'Pullover Cathrin', 'Pullover Markus', 'Schuhe Cat', 'Schuhe Markus', 'Socken Cathrin', 'Socken Markus', 'Sonnenbrille', 'Sonnenhut', 'Strandtasche', 'Tapes und Verband']),
      ...createItems('l_cmh', ['Apressoleil', 'Bodylotion', 'Deo Cat', 'Deo Markus', 'Dildo', 'Haarwachs', 'Hautcremes', 'Langhaarschneider', 'Linsen', 'Linsenwasser', 'Mückenspray', 'Mumu Schampoo', 'Munddusche', 'Parfum Cat', 'Parfum Markus', 'Rasierer Cathrin', 'Rasierer Markus', 'Schminkzeug', 'Schnarchspange', 'Seife', 'Sonnencreme', 'Zahnbürste', 'Zahnpasta']),
      ...createItems('l_nla', ['Badehosen', 'Bademantel', 'Badetuch', 'Bettdecken', 'Bücher', 'Flügeli', 'Helm', 'Hosen', 'Kappe', 'Kickboard', 'Kopfkissen', 'Kuscheltiere Levi', 'Kuscheltiere Noelle', 'Lego Monster', 'Leintuch', 'Ninjago Lego', 'Noelles Kuschelhund', 'Pijama', 'Portemonnaie Noelle', 'Röckli', 'Rucksack', 'Socken', 'Sonnenbrille', 'Sonnencreme', 'Spielsachen Noelle', 'Spielsachen Levi', 'Taucherbrille', 'Tonibox', 'Unterhose', 'Velo']),
      ...createItems('l_nlh', ['Zahnbürste', 'Zahnpasta', 'Haarbürste', 'Deo Noelle', 'Levi Penisspülung', 'Shampoo']),
      ...createItems('l_ess', ['div. Brötli', 'Zucker', 'Wasser für unterwegs', 'Spaghetti', 'Sandwichs', 'Salz im keller erster schrank', 'Red Bull', 'Rapsöl', 'Pfeffermühle', 'Ovo', 'Milch', 'Maizena', 'Maisbrot', 'Knabberzeugs', 'Kaffee', 'Hummus', 'Haferflocken', 'Gewürze', 'Ficken', 'Cracker', 'Bier', 'Apfelessig']),
      ...createItems('l_wohn', ['Wäscheklammern', 'Bett Reparatur', 'Activity', '100 Kleber Wohnwagen', 'Zweitschlüssel', 'Weitere Kabelrolle', 'Wc Papier', 'Waschmaschine', 'Vorzeltteppich 6x 2.5', 'Vignette', 'Ventilator', 'Venti noelle', 'Überzüge', 'Swiffer', 'Spiele', 'Spiel Bünzlitum', 'Schraube akku hering kont', 'Schnur', 'Schirm', 'Neues Licht', 'Neue Heringe', 'Musikbox', 'Licht kontrollieren', 'Kühltaschen', 'Klimaanlage', 'Klatschen Spiel', 'Kerzen', 'Kabelrolle', 'Ikeataschen', 'Handtücher', 'Hammer', 'Gasflasche', 'Elektrischer fliegenfänger', 'Bollerwagen', 'Bohrer für Heringe', 'Akkuschrauber', 'Akkusauger', '3 kabelrle', '110lt Abfallsack'])
    ];

    // --- HAUPTKOMPONENTE ---
    function App() {
      const storageKey = 'campingData_html_v1';
      
      const [folders, setFolders] = useState(() => {
        const saved = localStorage.getItem(`${storageKey}_folders`);
        return saved ? JSON.parse(saved) : defaultFolders;
      });
      const [lists, setLists] = useState(() => {
        const saved = localStorage.getItem(`${storageKey}_lists`);
        return saved ? JSON.parse(saved) : defaultLists;
      });
      const [items, setItems] = useState(() => {
        const saved = localStorage.getItem(`${storageKey}_items`);
        return saved ? JSON.parse(saved) : defaultItems;
      });

      const [activeFolderId, setActiveFolderId] = useState(folders[0]?.id || null);
      const [isSidebarOpen, setIsSidebarOpen] = useState(false);
      const [appTitle, setAppTitle] = useState(() => localStorage.getItem(`${storageKey}_title`) || 'CampPacker');
      
      const [activeListId, setActiveListId] = useState(() => {
        const firstFolderId = folders[0]?.id;
        return lists.find(l => l.folderId === firstFolderId)?.id || null;
      });

      const [editingId, setEditingId] = useState(null);
      const [editValue, setEditValue] = useState('');
      const [openMenuId, setOpenMenuId] = useState(null);
      const [isBulkMode, setIsBulkMode] = useState(false);
      const [selectedItemIds, setSelectedItemIds] = useState([]);

      const [transferModal, setTransferModal] = useState({
        isOpen: false, action: null, sourceType: null, sourceId: null
      });
      const [targetFolderId, setTargetFolderId] = useState('');
      const [targetListId, setTargetListId] = useState('');

      // Custom Confirm Dialog State
      const [confirmDialog, setConfirmDialog] = useState({ isOpen: false, message: '', onConfirm: null });

      const [newFolderName, setNewFolderName] = useState('');
      const [newListNames, setNewListNames] = useState({});
      const [newItemNames, setNewItemNames] = useState({});

      useEffect(() => {
        localStorage.setItem(`${storageKey}_folders`, JSON.stringify(folders));
        localStorage.setItem(`${storageKey}_lists`, JSON.stringify(lists));
        localStorage.setItem(`${storageKey}_items`, JSON.stringify(items));
        localStorage.setItem(`${storageKey}_title`, appTitle);
      }, [folders, lists, items, appTitle]);

      useEffect(() => {
        const handleClickOutside = () => setOpenMenuId(null);
        document.addEventListener('click', handleClickOutside);
        return () => document.removeEventListener('click', handleClickOutside);
      }, []);

      useEffect(() => {
        setIsBulkMode(false);
        setSelectedItemIds([]);
      }, [activeListId]);

      const generateId = () => Math.random().toString(36).substr(2, 9);

      const getDaysLeft = (dateStr) => {
        if (!dateStr) return null;
        const targetDate = new Date(dateStr);
        const today = new Date();
        targetDate.setHours(0,0,0,0);
        today.setHours(0,0,0,0);
        const diffTime = targetDate - today;
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        
        if (diffDays > 1) return `Noch ${diffDays} Tage`;
        if (diffDays === 1) return `Morgen!`;
        if (diffDays === 0) return `Heute!`;
        if (diffDays < 0) return `Vorbei`;
        return null;
      };

      const openConfirm = (message, onConfirm) => {
        setConfirmDialog({ isOpen: true, message, onConfirm });
      };

      const closeConfirm = () => {
        setConfirmDialog({ isOpen: false, message: '', onConfirm: null });
      };

      const addFolder = (e) => {
        e.preventDefault();
        if (!newFolderName.trim()) return;
        const newFolder = { id: generateId(), name: newFolderName.trim(), date: '' };
        setFolders([...folders, newFolder]);
        setNewFolderName('');
        if (!activeFolderId) {
          setActiveFolderId(newFolder.id);
          setActiveListId(null);
        }
      };

      const deleteFolder = (folderId) => {
        openConfirm('Trip und alle Inhalte wirklich löschen?', () => {
          setFolders(folders.filter(f => f.id !== folderId));
          setLists(lists.filter(l => l.folderId !== folderId));
          if (activeFolderId === folderId) {
            const nextFolder = folders.length > 1 ? folders.find(f => f.id !== folderId) : null;
            setActiveFolderId(nextFolder ? nextFolder.id : null);
            setActiveListId(nextFolder ? lists.find(l => l.folderId === nextFolder.id)?.id || null : null);
          }
        });
      };

      const addList = (e, folderId) => {
        e.preventDefault();
        const name = newListNames[folderId];
        if (!name?.trim()) return;
        const newList = { id: generateId(), folderId, name: name.trim() };
        setLists([...lists, newList]);
        setNewListNames({ ...newListNames, [folderId]: '' });
        setActiveListId(newList.id);
      };

      const deleteList = (listId) => {
        openConfirm('Kategorie wirklich löschen?', () => {
          setLists(lists.filter(l => l.id !== listId));
          if (activeListId === listId) {
            const remainingInFolder = lists.filter(l => l.folderId === activeFolderId && l.id !== listId);
            setActiveListId(remainingInFolder.length > 0 ? remainingInFolder[0].id : null);
          }
        });
      };

      const addItem = (e, listId) => {
        e.preventDefault();
        const name = newItemNames[listId];
        if (!name?.trim()) return;
        const newItem = { id: generateId(), listId, name: name.trim(), checked: false };
        setItems([...items, newItem]);
        setNewItemNames({ ...newItemNames, [listId]: '' });
      };

      const deleteItem = (itemId) => {
        setItems(items.filter(i => i.id !== itemId));
      };

      const toggleItem = (itemId) => {
        if (isBulkMode) {
          setSelectedItemIds(prev => 
            prev.includes(itemId) ? prev.filter(id => id !== itemId) : [...prev, itemId]
          );
        } else {
          setItems(items.map(item => item.id === itemId ? { ...item, checked: !item.checked } : item));
        }
      };

      const startEdit = (id, initialValue) => {
        setEditingId(id);
        setEditValue(initialValue);
        setOpenMenuId(null);
      };

      const saveEdit = () => {
        if (!editingId) return;
        const [type, id] = editingId.split('-');
        if (editValue.trim() !== '') {
          if (type === 'app') setAppTitle(editValue.trim());
          else if (type === 'folder') setFolders(folders.map(f => f.id === id ? { ...f, name: editValue.trim() } : f));
          else if (type === 'list') setLists(lists.map(l => l.id === id ? { ...l, name: editValue.trim() } : l));
          else if (type === 'item') setItems(items.map(i => i.id === id ? { ...i, name: editValue.trim() } : i));
        }
        setEditingId(null);
      };

      const handleEditKeyDown = (e) => {
        if (e.key === 'Enter') saveEdit();
        if (e.key === 'Escape') setEditingId(null);
      };

      const handleDateChange = (folderId, newDate) => {
        setFolders(folders.map(f => f.id === folderId ? { ...f, date: newDate } : f));
      };

      const reactivateAllInFolder = (folderId) => {
        const folderListIds = lists.filter(l => l.folderId === folderId).map(l => l.id);
        setItems(items.map(i => folderListIds.includes(i.listId) ? { ...i, checked: false } : i));
      };

      const openTransferModal = (action, sourceType, sourceId) => {
        setTargetFolderId(activeFolderId);
        if (sourceType === 'item' || sourceType === 'bulk-items') {
           const availableLists = lists.filter(l => l.folderId === activeFolderId);
           setTargetListId(availableLists.length > 0 ? availableLists[0].id : '');
        } else {
           setTargetListId('');
        }
        setTransferModal({ isOpen: true, action, sourceType, sourceId });
        setOpenMenuId(null);
      };

      const executeTransfer = () => {
        const { action, sourceType, sourceId } = transferModal;

        if (sourceType === 'list') {
          const listToProcess = lists.find(l => l.id === sourceId);
          if (action === 'move') {
            setLists(lists.map(l => l.id === sourceId ? { ...l, folderId: targetFolderId } : l));
            if (targetFolderId !== activeFolderId && activeListId === sourceId) setActiveListId(null);
          } else if (action === 'copy') {
            const newListId = generateId();
            setLists([...lists, { ...listToProcess, id: newListId, folderId: targetFolderId }]);
            const itemsToCopy = items.filter(i => i.listId === sourceId);
            const newItems = itemsToCopy.map(i => ({ ...i, id: generateId(), listId: newListId, checked: false }));
            setItems([...items, ...newItems]);
          }
        } 
        else if (sourceType === 'item' || sourceType === 'bulk-items') {
          const idsToProcess = Array.isArray(sourceId) ? sourceId : [sourceId];
          if (!targetListId) {
            // Replaced alert with openConfirm but since it's just info, we'll auto close or use a simpler state
            return;
          }
          if (action === 'move') {
            setItems(items.map(i => idsToProcess.includes(i.id) ? { ...i, listId: targetListId } : i));
          } else if (action === 'copy') {
            const itemsToCopy = items.filter(i => idsToProcess.includes(i.id));
            const newItems = itemsToCopy.map(i => ({ ...i, id: generateId(), listId: targetListId, checked: false }));
            setItems([...items, ...newItems]);
          }
        }
        setTransferModal({ isOpen: false, action: null, sourceType: null, sourceId: null });
        setIsBulkMode(false);
        setSelectedItemIds([]);
      };

      const executeBulkDelete = () => {
        openConfirm(`${selectedItemIds.length} Utensilien wirklich löschen?`, () => {
          setItems(items.filter(i => !selectedItemIds.includes(i.id)));
          setIsBulkMode(false);
          setSelectedItemIds([]);
        });
      };

      const renderInlineInput = (id, containerClasses = "flex-1") => (
        <div className={`flex items-center gap-2 ${containerClasses}`}>
          <input
            autoFocus
            type="text"
            value={editValue}
            onChange={(e) => setEditValue(e.target.value)}
            onKeyDown={handleEditKeyDown}
            onBlur={saveEdit}
            onClick={(e) => e.stopPropagation()}
            className="bg-white border-2 border-emerald-400 rounded px-2 py-1 text-sm text-stone-800 outline-none w-full shadow-sm font-normal"
          />
        </div>
      );

      const DropdownMenu = ({ id, options }) => {
        if (openMenuId !== id) return null;
        return (
          <div className="absolute right-0 top-full mt-1 w-48 bg-white rounded-xl shadow-lg border border-stone-100 py-1 z-50">
            {options.map((opt, idx) => (
              opt.separator ? (

                  onClick={(e) => { e.stopPropagation(); opt.action(); setOpenMenuId(null); }}

                  {opt.icon} {opt.label}
                </button>
              )
            ))}
          </div>
        );
      };

      const activeFolder = folders.find(f => f.id === activeFolderId);
      const activeLists = lists.filter(l => l.folderId === activeFolderId);
      const activeList = activeLists.find(l => l.id === activeListId) || activeLists[0];

      const openItems = currentListItems.filter(i => !i.checked);
      const doneItems = currentListItems.filter(i => i.checked);

        const folderLists = lists.filter(l => l.folderId === folderId);
        const listIds = folderLists.map(l => l.id);
        const folderItems = items.filter(i => listIds.includes(i.listId));
        if (folderItems.length === 0) return 0;
        return Math.round((folderItems.filter(i => i.checked).length / folderItems.length) * 100);

                  {editingId === 'app-title-desktop' ? renderInlineInput('app-title-desktop') : appTitle}

            <div className="flex-1 overflow-y-auto p-4 pb-24">

                          isActiveFolder ? 'bg-stone-50 border border-stone-200 shadow-sm' : 'hover:bg-stone-50 border border-transparent'
                        }`}
                      >
                        <div
                          onClick={() => {
                            setActiveFolderId(folder.id);

                        </div>

                          >
                            <MoreVertical className="h-5 w-5" />
                          </button>
                          <DropdownMenu 
                            id={`menu-folder-${folder.id}`} 
                            options={[
                              { label: 'Umbenennen', icon: <Edit2 className="h-4 w-4"/>, action: () => startEdit(`folder-${folder.id}`, folder.name) },

                              { label: 'Löschen', icon: <Trash2 className="h-4 w-4"/>, action: () => deleteFolder(folder.id), danger: true }

                                  <button

                        >

                    </div>
                  </div>
                </header>

                  <div className="max-w-3xl mx-auto">

                                isBulkMode ? 'bg-emerald-100 text-emerald-800 border-emerald-200' : 'bg-white text-stone-500 border-stone-200 hover:bg-stone-50'
                              }`}
                            >
                              <Edit2 className="h-4 w-4"/> {isBulkMode ? 'Fertig' : 'Mehrere bearbeiten'}
                            </button>
                          )}
                        </div>

                        {!isBulkMode && (
                          <form onSubmit={(e) => addItem(e, activeList.id)} className="mb-8">

                              <input
                                type="text"
                                placeholder={`Was brauchst du für "${activeList.name}"?`}
                                value={newItemNames[activeList.id] || ''}
                                onChange={(e) => setNewItemNames({ ...newItemNames, [activeList.id]: e.target.value })}
                                className="w-full bg-stone-50 border border-stone-200 rounded-xl py-3 pl-4 pr-12 text-sm focus:bg-white focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all placeholder:text-stone-500"
                              />
                              <button type="submit" className="absolute right-2 top-1/2 -translate-y-1/2 text-white bg-emerald-500 hover:bg-emerald-600 p-1.5 rounded-lg transition-colors">
                                <Plus className="h-5 w-5" />
                              </button>
                            </div>
                          </form>

                                      { label: 'Kopieren nach...', icon: <CopyIcon className="h-4 w-4"/>, action: () => openTransferModal('copy', 'item', item.id) },
                                      { separator: true },
                                      { label: 'Löschen', icon: <Trash2 className="h-4 w-4"/>, action: () => deleteItem(item.id), danger: true }

                                  />

                            </li>

                    <div>
                      <label className="block text-sm font-semibold text-stone-500 mb-2">Ziel-Kategorie (Liste)</label>
                      <select 
                        value={targetListId} 
                        onChange={(e) => setTargetListId(e.target.value)}
                        className="w-full bg-stone-50 border border-stone-200 rounded-xl p-3 outline-none focus:border-emerald-500"
                      >
                        <option value="" disabled>Bitte wählen...</option>
                        {lists.filter(l => l.folderId === targetFolderId).map(l => (
                           <option key={l.id} value={l.id}>{l.name}</option>
                        ))}
                      </select>
                      {lists.filter(l => l.folderId === targetFolderId).length === 0 && (
                         <p className="text-xs text-amber-600 mt-2">Dieser Trip hat noch keine Kategorien. Bitte erstelle zuerst eine Kategorie in diesem Trip.</p>
                      )}
                    </div>
                  )}
                </div>

                <div className="p-4 bg-stone-50 flex justify-end gap-3 border-t border-stone-100">
                  <button 
                    onClick={() => setTransferModal({isOpen: false})}
                    className="px-4 py-2 text-stone-500 font-medium hover:bg-stone-200 rounded-xl transition-colors"
                  >
                    Abbrechen
                  </button>
                  <button 
                    onClick={executeTransfer}
                    disabled={transferModal.sourceType !== 'list' && !targetListId}
                    className="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white font-medium rounded-xl transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2"
                  >
                    {transferModal.action === 'move' ? <ArrowRightLeft className="h-4 w-4"/> : <CopyIcon className="h-4 w-4"/>}
                    Ausführen
                  </button>
                </div>
              </div>
            </div>
          )}

          {isSidebarOpen && <div className="fixed inset-0 bg-stone-900/50 z-20 md:hidden" onClick={() => setIsSidebarOpen(false)} />}
        </div>
      );
    }

    // --- APP STARTEN ---
    const rootElement = document.getElementById("root");
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>

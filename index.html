    // --- ICON KOMPONENTEN ---

    const Folder = (p) => <IconWrapper {...p}><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/></IconWrapper>;

    const ArrowRightLeft = (p) => <IconWrapper {...p}><path d="m16 3 4 4-4 4"/><path d="M20 7H4"/><path d="m8 21-4-4 4-4"/><path d="M4 17h16"/></IconWrapper>;
    const Edit2 = (p) => <IconWrapper {...p}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></IconWrapper>;
    const Clock = (p) => <IconWrapper {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></IconWrapper>;
    const AlertTriangle = (p) => <IconWrapper {...p}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></IconWrapper>;
    const Cloud = (p) => <IconWrapper {...p}><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></IconWrapper>;

    // --- DEINE FIREBASE KONFIGURATION ---
    const firebaseConfig = {
      apiKey: "AIzaSyBoA1ni-vhIDNlTFhibcagIOJETQD1tYh8",
      authDomain: "camppacker-d27e4.firebaseapp.com",
      projectId: "camppacker-d27e4",

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- DEINE STANDARD-UTENSILIEN ---
    const createItems = (listId, names) => names.map((name, index) => ({ id: `item_${listId}_${index}`, listId, name, checked: false }));

    const defaultFolders = [
      { id: 'f_grosse', name: 'Grosse Reise', date: '' },
      { id: 'f_kleine', name: 'kleine Reise', date: '' }
    ];

    const defaultLists = [
      { id: 'l_vdr', folderId: 'f_grosse', name: 'Vor der Reise' },
      { id: 'l_ele', folderId: 'f_grosse', name: 'Elektronik' },
      { id: 'l_med', folderId: 'f_grosse', name: 'Medikamente' },
      { id: 'l_cma', folderId: 'f_grosse', name: 'Ca Ma Allgemein' },
      { id: 'l_cmh', folderId: 'f_grosse', name: 'Ca Ma Hygieneartikel' },
      { id: 'l_nla', folderId: 'f_grosse', name: 'No Le Allgemein' },
      { id: 'l_nlh', folderId: 'f_grosse', name: 'No Le Hygieneartikel' },
      { id: 'l_ess', folderId: 'f_grosse', name: 'Essen' },
      { id: 'l_wohn', folderId: 'f_grosse', name: 'Für Wohnwagen' },
      { id: 'l_kue', folderId: 'f_grosse', name: 'Küche' },
      { id: 'l_cos', folderId: 'f_grosse', name: 'Cosmo' },
      { id: 'l_3d', folderId: 'f_grosse', name: '3d druck' },
      { id: 'l_ueb', folderId: 'f_kleine', name: 'über Nacht' },
      { id: 'l_mer', folderId: 'f_kleine', name: 'Meran' }
    ];

    const defaultItems = [
      ...createItems('l_vdr', ['Mower', 'Kaffeemaschine trester leeren', 'Kühlschrank automation aus', 'Schloss laden', 'Einstiegshöcker neu 2025', 'Druckknopf küche ww kaputt 2025', 'Chlor auf sitzplatz', 'Roaming cat', 'Aussenkabel klima', 'Heringset zum in den Boden zu schrauben', 'Velos in die Garage stellen', 'Neue Spielsachen Überraschung', 'Unwichtige Karten aus Portemonnaie', 'Ausweise und kreditkarte scannen', 'Rollladen zurück', 'Ausdruck', 'Filme downloaden', 'Pool ferientimer', 'Spülchemie', 'Handyladegerät von Prius in Rav', 'Nackenkissen', 'Geschirrspülmaschine öffnen', 'Abfallsäcke entsorgen', 'Kühlschrank leeren', 'Rollläden öffnen/schliessen', 'Pflanzen giessen', 'Milch', 'Pool chloren', 'Hue Licht starten', 'Geld', 'Reservation', 'Comput ausschalten']),
      ...createItems('l_ele', ['Airpods', 'Autoladekabel', 'Doppelstecker', 'Handyladekabel', 'ipad', 'ipadladekabel', 'Levi Uhr', 'Plastik unter Teppich', 'Switch', 'Tolino', 'Tonibox und figuren levi', 'Toniebox ladekabel', 'Toniebox mit figuren Noelle', 'Watch', 'Weitere kabelrolle']),
      ...createItems('l_med', ['Algifor Kinder', 'Fiebermesser', 'ibuprofen', 'Dafalgan', 'Ohrentropfen', 'Pflaster', 'Verbandszeug', 'Zugsalbe', 'Fusspilzcreme', 'Mückenstich', 'Proto', 'Alphasteam', 'Coldpack']),
      ...createItems('l_cma', ['Unterhosen Cathrin', 'Unterhosen Markus', 'Badehose Cat', 'Badehosen Markus', 'Badetücher fürs Meer', 'Bettdecke', 'Bh', 'Brille', 'Diffuser', 'Duschtücher gross', 'Einlegesohle', 'Einlegesohlen', 'Euros', 'Flip Flop Cat', 'Flip Flop Markus', 'Gurt', 'Hut Cat', 'Isomatte Steinstrand', 'Jäckchen Cat', 'Jäckchen Markus', 'Kappe Markus', 'Kurze Hosen Cat', 'Kurze Hosen Markus', 'Ladegerät Zahnbürste', 'Lange Hose cat', 'Lange hose Markus', 'Linsen', 'Linsenwasser', 'Oberteile Cat', 'Oberteile Markus', 'Pijama / Trainer', 'Pipipads', 'Pullover Cathrin', 'Pullover Markus', 'Schuhe Cat', 'Schuhe Markus', 'Socken Cathrin', 'Socken Markus', 'Sonnenbrille', 'Sonnenhut', 'Strandtasche', 'Tapes und Verband']),
      ...createItems('l_cmh', ['Apressoleil', 'Bodylotion', 'Deo Cat', 'Deo Markus', 'Dildo', 'Haarwachs', 'Hautcremes', 'Langhaarschneider', 'Linsen', 'Linsenwasser', 'Mückenspray', 'Mumu Schampoo', 'Munddusche', 'Parfum Cat', 'Parfum Markus', 'Rasierer Cathrin', 'Rasierer Markus', 'Schminkzeug', 'Schnarchspange', 'Seife', 'Sonnencreme', 'Zahnbürste', 'Zahnpasta']),
      ...createItems('l_nla', ['Badehosen', 'Bademantel', 'Badetuch', 'Bettdecken', 'Bücher', 'Flügeli', 'Helm', 'Hosen', 'Kappe', 'Kickboard', 'Kopfkissen', 'Kuscheltiere Levi', 'Kuscheltiere Noelle', 'Lego Monster', 'Leintuch', 'Ninjago Lego', 'Noelles Kuschelhund', 'Pijama', 'Portemonnaie Noelle', 'Röckli', 'Rucksack', 'Socken', 'Sonnenbrille', 'Sonnencreme', 'Spielsachen Noelle', 'Spielsachen Levi', 'Taucherbrille', 'Tonibox', 'Unterhose', 'Velo']),
      ...createItems('l_nlh', ['Zahnbürste', 'Zahnpasta', 'Haarbürste', 'Deo Noelle', 'Levi Penisspülung', 'Shampoo']),
      ...createItems('l_ess', ['div. Brötli', 'Zucker', 'Wasser für unterwegs', 'Spaghetti', 'Sandwichs', 'Salz im keller erster schrank', 'Red Bull', 'Rapsöl', 'Pfeffermühle', 'Ovo', 'Milch', 'Maizena', 'Maisbrot', 'Knabberzeugs', 'Kaffee', 'Hummus', 'Haferflocken', 'Gewürze', 'Ficken', 'Cracker', 'Bier', 'Apfelessig']),
      ...createItems('l_wohn', ['Wäscheklammern', 'Bett Reparatur', 'Activity', '100 Kleber Wohnwagen', 'Zweitschlüssel', 'Weitere Kabelrolle', 'Wc Papier', 'Waschmaschine', 'Vorzeltteppich 6x 2.5', 'Vignette', 'Ventilator', 'Venti noelle', 'Überzüge', 'Swiffer', 'Spiele', 'Spiel Bünzlitum', 'Schraube akku hering kont', 'Schnur', 'Schirm', 'Neues Licht', 'Neue Heringe', 'Musikbox', 'Licht kontrollieren', 'Kühltaschen', 'Klimaanlage', 'Klatschen Spiel', 'Kerzen', 'Kabelrolle', 'Ikeataschen', 'Handtücher', 'Hammer', 'Gasflasche', 'Elektrischer fliegenfänger', 'Bollerwagen', 'Bohrer für Heringe', 'Akkuschrauber', 'Akkusauger', '3 kabelrle', '110lt Abfallsack'])
    ];


    // --- HAUPTKOMPONENTE ---
    function App() {
      const [folders, setFolders] = useState([]);
      const [lists, setLists] = useState([]);
      const [items, setItems] = useState([]);
      const [isLoading, setIsLoading] = useState(true);
      const [isUploading, setIsUploading] = useState(false);

      const [activeFolderId, setActiveFolderId] = useState(null);
      const [activeListId, setActiveListId] = useState(null);
      const [isSidebarOpen, setIsSidebarOpen] = useState(false);
      const [appTitle, setAppTitle] = useState('CampPacker');
      
      const [editingId, setEditingId] = useState(null);
      const [editValue, setEditValue] = useState('');
      const [openMenuId, setOpenMenuId] = useState(null);
      const [isBulkMode, setIsBulkMode] = useState(false);
      const [selectedItemIds, setSelectedItemIds] = useState([]);

      const [transferModal, setTransferModal] = useState({ isOpen: false, action: null, sourceType: null, sourceId: null });
      const [targetFolderId, setTargetFolderId] = useState('');
      const [targetListId, setTargetListId] = useState('');
      const [confirmDialog, setConfirmDialog] = useState({ isOpen: false, message: '', onConfirm: null });

      const [newFolderName, setNewFolderName] = useState('');
      const [newListNames, setNewListNames] = useState({});
      const [newItemNames, setNewItemNames] = useState({});

      const generateId = () => Math.random().toString(36).substr(2, 9);

      // DATEN AUS FIRESTORE LADEN (Global & Login-frei)
      useEffect(() => {
        const unsubFolders = onSnapshot(collection(db, 'folders'), 
          (snap) => {
            const loadedFolders = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            setFolders(loadedFolders);
            if (loadedFolders.length > 0 && !activeFolderId) {
              setActiveFolderId(loadedFolders[0].id);
            }
            setIsLoading(false);
          },
          (err) => { console.error("Fehler beim Laden:", err); setIsLoading(false); }
        );

        const unsubLists = onSnapshot(collection(db, 'lists'), 
          (snap) => setLists(snap.docs.map(d => ({ id: d.id, ...d.data() })))
        );

        const unsubItems = onSnapshot(collection(db, 'items'), 
          (snap) => setItems(snap.docs.map(d => ({ id: d.id, ...d.data() })))
        );

        return () => { unsubFolders(); unsubLists(); unsubItems(); };
      }, [activeFolderId]);

      // Aktive Liste automatisch setzen
      useEffect(() => {
        if (activeFolderId) {
          const folderLists = lists.filter(l => l.folderId === activeFolderId);
          if (folderLists.length > 0 && !folderLists.find(l => l.id === activeListId)) {
            setActiveListId(folderLists[0].id);
          } else if (folderLists.length === 0) {
            setActiveListId(null);
          }
        }
      }, [activeFolderId, lists]);

      useEffect(() => {
        const handleClickOutside = () => setOpenMenuId(null);
        document.addEventListener('click', handleClickOutside);
        return () => document.removeEventListener('click', handleClickOutside);
      }, []);

      const getDaysLeft = (dateStr) => {
        if (!dateStr) return null;
        const targetDate = new Date(dateStr);
        const today = new Date();
        targetDate.setHours(0,0,0,0);
        today.setHours(0,0,0,0);
        const diffTime = targetDate - today;
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        if (diffDays > 1) return `Noch ${diffDays} Tage`;
        if (diffDays === 1) return `Morgen!`;
        if (diffDays === 0) return `Heute!`;
        if (diffDays < 0) return `Vorbei`;
        return null;
      };

      const openConfirm = (message, onConfirm) => setConfirmDialog({ isOpen: true, message, onConfirm });
      const closeConfirm = () => setConfirmDialog({ isOpen: false, message: '', onConfirm: null });

      // --- STANDARDDATEN IN DIE CLOUD LADEN ---
      const loadDefaultsToCloud = async () => {
        openConfirm('Möchtest du alle deine ursprünglichen Listen jetzt in deine leere Cloud laden?', async () => {
          setIsUploading(true);
          try {
            for (let f of defaultFolders) await setDoc(doc(db, 'folders', f.id), { name: f.name, date: f.date });
            for (let l of defaultLists) await setDoc(doc(db, 'lists', l.id), { folderId: l.folderId, name: l.name });
            for (let i of defaultItems) await setDoc(doc(db, 'items', i.id), { listId: i.listId, name: i.name, checked: i.checked });
          } catch (err) {
            console.error("Fehler beim Hochladen:", err);
            alert("Fehler beim Speichern in der Cloud.");
          }
          setIsUploading(false);
        });
      };

      // --- FIRESTORE SCHREIBOPERATIONEN ---

      const addFolder = async (e) => {
        e.preventDefault();
        if (!newFolderName.trim()) return;
        const newId = generateId();
        await setDoc(doc(db, 'folders', newId), { name: newFolderName.trim(), date: '' });
        setNewFolderName('');
        setActiveFolderId(newId);
        setActiveListId(null);
      };

      const deleteFolder = (folderId) => {
        openConfirm('Trip und alle Inhalte wirklich löschen?', async () => {
          await deleteDoc(doc(db, 'folders', folderId));
          const listsToDelete = lists.filter(l => l.folderId === folderId);
          for (let l of listsToDelete) {
            await deleteDoc(doc(db, 'lists', l.id));
            const itemsToDelete = items.filter(i => i.listId === l.id);
            for (let i of itemsToDelete) {
              await deleteDoc(doc(db, 'items', i.id));
            }
          }
        });
      };

      const addList = async (e, folderId) => {
        e.preventDefault();
        const name = newListNames[folderId];
        if (!name?.trim()) return;
        const newId = generateId();
        await setDoc(doc(db, 'lists', newId), { folderId, name: name.trim() });
        setNewListNames({ ...newListNames, [folderId]: '' });
        setActiveListId(newId);
      };

      const deleteList = (listId) => {
        openConfirm('Kategorie wirklich löschen?', async () => {
          await deleteDoc(doc(db, 'lists', listId));
          const itemsToDelete = items.filter(i => i.listId === listId);
          for (let item of itemsToDelete) {
            await deleteDoc(doc(db, 'items', item.id));
          }
        });
      };

      const addItem = async (e, listId) => {
        e.preventDefault();
        const name = newItemNames[listId];
        if (!name?.trim()) return;
        const newId = generateId();
        await setDoc(doc(db, 'items', newId), { listId, name: name.trim(), checked: false });
        setNewItemNames({ ...newItemNames, [listId]: '' });
      };

      const deleteItem = async (itemId) => {
        await deleteDoc(doc(db, 'items', itemId));
      };

      const toggleItem = async (itemId) => {
        if (isBulkMode) {
          setSelectedItemIds(prev => prev.includes(itemId) ? prev.filter(id => id !== itemId) : [...prev, itemId]);
        } else {
          const targetItem = items.find(i => i.id === itemId);
          if(targetItem) {
            await setDoc(doc(db, 'items', itemId), { checked: !targetItem.checked }, { merge: true });
          }
        }
      };

      const startEdit = (id, initialValue) => {
        setEditingId(id);
        setEditValue(initialValue);
        setOpenMenuId(null);
      };

      const saveEdit = async () => {
        if (!editingId) return;
        const [type, id] = editingId.split('-');
        if (editValue.trim() !== '') {
          if (type === 'app') setAppTitle(editValue.trim()); 
          else if (type === 'folder') await setDoc(doc(db, 'folders', id), { name: editValue.trim() }, { merge: true });
          else if (type === 'list') await setDoc(doc(db, 'lists', id), { name: editValue.trim() }, { merge: true });
          else if (type === 'item') await setDoc(doc(db, 'items', id), { name: editValue.trim() }, { merge: true });
        }
        setEditingId(null);
      };

      const handleEditKeyDown = (e) => {
        if (e.key === 'Enter') saveEdit();
        if (e.key === 'Escape') setEditingId(null);
      };

      const handleDateChange = async (folderId, newDate) => {
        await setDoc(doc(db, 'folders', folderId), { date: newDate }, { merge: true });
      };

      const reactivateAllInFolder = async (folderId) => {
        const folderListIds = lists.filter(l => l.folderId === folderId).map(l => l.id);
        const itemsToReactivate = items.filter(i => folderListIds.includes(i.listId) && i.checked);
        for (let item of itemsToReactivate) {
          await setDoc(doc(db, 'items', item.id), { checked: false }, { merge: true });
        }
      };

      const executeTransfer = async () => {
        const { action, sourceType, sourceId } = transferModal;

        if (sourceType === 'list') {
          const listToProcess = lists.find(l => l.id === sourceId);
          if (action === 'move') {
            await setDoc(doc(db, 'lists', sourceId), { folderId: targetFolderId }, { merge: true });
          } else if (action === 'copy') {
            const newListId = generateId();
            await setDoc(doc(db, 'lists', newListId), { ...listToProcess, id: undefined, folderId: targetFolderId });
            const itemsToCopy = items.filter(i => i.listId === sourceId);
            for (let item of itemsToCopy) {
              await setDoc(doc(db, 'items', generateId()), { ...item, id: undefined, listId: newListId, checked: false });
            }
          }
        } 
        else if (sourceType === 'item' || sourceType === 'bulk-items') {
          const idsToProcess = Array.isArray(sourceId) ? sourceId : [sourceId];
          if (!targetListId) return;
          
          if (action === 'move') {
            for (let id of idsToProcess) {
              await setDoc(doc(db, 'items', id), { listId: targetListId }, { merge: true });
            }
          } else if (action === 'copy') {
            const itemsToCopy = items.filter(i => idsToProcess.includes(i.id));
            for (let item of itemsToCopy) {
              await setDoc(doc(db, 'items', generateId()), { ...item, id: undefined, listId: targetListId, checked: false });
            }
          }
        }
        setTransferModal({ isOpen: false, action: null, sourceType: null, sourceId: null });
        setIsBulkMode(false);
        setSelectedItemIds([]);
      };

      const executeBulkDelete = () => {
        openConfirm(`${selectedItemIds.length} Utensilien wirklich löschen?`, async () => {
          for (let id of selectedItemIds) {
            await deleteDoc(doc(db, 'items', id));
          }
          setIsBulkMode(false);
          setSelectedItemIds([]);
        });
      };
      
      const openTransferModal = (action, sourceType, sourceId) => {
        setTargetFolderId(activeFolderId);
        if (sourceType === 'item' || sourceType === 'bulk-items') {
           const availableLists = lists.filter(l => l.folderId === activeFolderId);
           setTargetListId(availableLists.length > 0 ? availableLists[0].id : '');
        } else {
           setTargetListId('');
        }
        setTransferModal({ isOpen: true, action, sourceType, sourceId });
        setOpenMenuId(null);
      };

      // --- RENDERING HILFSFUNKTIONEN ---

      const renderInlineInput = (id, containerClasses = "flex-1") => (
        <div className={`flex items-center gap-2 ${containerClasses}`}>
          <input autoFocus type="text" value={editValue} onChange={(e) => setEditValue(e.target.value)} onKeyDown={handleEditKeyDown} onBlur={saveEdit} onClick={(e) => e.stopPropagation()} className="bg-white border-2 border-emerald-400 rounded px-2 py-1 text-sm text-stone-800 outline-none w-full shadow-sm font-normal" />
        </div>
      );

      const DropdownMenu = ({ id, options }) => {
        if (openMenuId !== id) return null;
        return (
          <div className="absolute right-0 top-full mt-1 w-48 bg-white rounded-xl shadow-lg border border-stone-100 py-1 z-50">
            {options.map((opt, idx) => opt.separator ? (
                <div key={`sep-${idx}`} className="h-px bg-stone-100 my-1 w-full" />
              ) : (
                <button key={opt.label} onClick={(e) => { e.stopPropagation(); opt.action(); setOpenMenuId(null); }} className={`w-full text-left px-4 py-2 text-sm flex items-center gap-2 transition-colors ${opt.danger ? 'text-red-600 hover:bg-red-50' : 'text-stone-700 hover:bg-stone-50'}`}>
                  {opt.icon} {opt.label}
                </button>
            ))}
          </div>
        );
      };

      if (isLoading) {
        return null; // Wird von der CSS-Ladeanzeige überdeckt
      }

      const activeFolder = folders.find(f => f.id === activeFolderId);
      const activeLists = lists.filter(l => l.folderId === activeFolderId);
      const activeList = activeLists.find(l => l.id === activeListId) || activeLists[0];
      const currentListItems = items.filter(i => i.listId === activeList?.id);
      const openItems = currentListItems.filter(i => !i.checked);
      const doneItems = currentListItems.filter(i => i.checked);

      const getFolderProgress = (folderId) => {
        const folderLists = lists.filter(l => l.folderId === folderId);
        const listIds = folderLists.map(l => l.id);
        const folderItems = items.filter(i => listIds.includes(i.listId));
        if (folderItems.length === 0) return 0;
        return Math.round((folderItems.filter(i => i.checked).length / folderItems.length) * 100);
      };

      return (
        <div className="h-screen w-full bg-[#f4f7f4] font-sans text-stone-800 flex flex-col md:flex-row overflow-hidden relative">
          
          {/* Mobile Header (mit Versionsnummer v1.1.0) */}
          <div className="md:hidden bg-emerald-700 text-white p-4 flex justify-between items-center shadow-md z-20">
            <div className="flex items-center gap-2 font-bold text-xl flex-1 cursor-pointer">
              <Tent className="h-6 w-6 text-emerald-200 shrink-0" />
              <div className="flex items-center min-w-0">
                <span className="truncate">{appTitle}</span>
                <span className="text-[10px] bg-emerald-800 text-emerald-200 px-1.5 py-0.5 rounded ml-2 font-mono shrink-0">v1.1.0</span>
              </div>
            </div>
            <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-1 hover:bg-emerald-600 rounded shrink-0">
              {isSidebarOpen ? <X className="h-6 w-6" /> : <Menu className="h-6 w-6" />}
            </button>
          </div>

          {/* Sidebar */}
          <aside className={`
            ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'} 
            md:translate-x-0 transition-transform duration-300 ease-in-out
            fixed md:static top-0 left-0 h-full w-[80%] md:w-80 
            bg-white border-r border-stone-200 shadow-xl md:shadow-none z-30 flex flex-col
          `}>
            {/* Desktop Header (mit Versionsnummer v1.1.0) */}
            <div className="p-6 bg-emerald-700 text-white hidden md:flex items-center gap-3 shrink-0">
              <TreePine className="h-8 w-8 text-emerald-200 flex-shrink-0" />
              <div className="min-w-0 flex-1">
                <div className="flex items-center">
                  <h1 className="font-bold text-xl tracking-wide truncate">{appTitle}</h1>
                  <span className="text-[10px] bg-emerald-800 text-emerald-200 px-1.5 py-0.5 rounded ml-2 font-mono shrink-0">v1.1.0</span>
                </div>
                <p className="text-emerald-200 text-xs uppercase tracking-wider font-semibold flex items-center gap-1 mt-0.5"><Cloud className="h-3 w-3"/> Cloud Sync</p>
              </div>
            </div>

            <div className="flex-1 overflow-y-auto p-4 pb-24">
              <h2 className="text-xs font-bold text-stone-400 uppercase tracking-wider mb-4 px-2">Geplante Reisen</h2>
              
              <ul className="space-y-2">
                {folders.map(folder => {
                  const progress = getFolderProgress(folder.id);
                  const isActiveFolder = activeFolderId === folder.id;
                  const folderLists = lists.filter(l => l.folderId === folder.id);

                  return (
                    <li key={folder.id}>
                      <div className={`w-full text-left rounded-xl flex items-center justify-between transition-all ${isActiveFolder ? 'bg-stone-50 border border-stone-200 shadow-sm' : 'hover:bg-stone-50 border border-transparent'}`}>
                        <div onClick={() => { setActiveFolderId(folder.id); if (window.innerWidth < 768 && folderLists.length === 0) setIsSidebarOpen(false); }} className="flex-1 text-left px-4 py-3 flex items-center gap-3 overflow-hidden cursor-pointer">
                          <MapIcon className={`h-5 w-5 flex-shrink-0 ${isActiveFolder ? 'text-emerald-600' : 'text-stone-400'}`} />
                          <div className={`truncate font-medium flex-1 ${isActiveFolder ? 'text-stone-800' : 'text-stone-600'}`}>
                            {editingId === `folder-${folder.id}` ? renderInlineInput(`folder-${folder.id}`) : folder.name}
                          </div>
                        </div>
                        <div className="relative pr-2 shrink-0">
                          <button onClick={(e) => { e.stopPropagation(); setOpenMenuId(`menu-folder-${folder.id}`); }} className="p-1.5 text-stone-400 hover:text-emerald-600 rounded-md hover:bg-stone-100"><MoreVertical className="h-5 w-5" /></button>
                          <DropdownMenu id={`menu-folder-${folder.id}`} options={[
                              { label: 'Umbenennen', icon: <Edit2 className="h-4 w-4"/>, action: () => startEdit(`folder-${folder.id}`, folder.name) },
                              { separator: true },
                              { label: 'Löschen', icon: <Trash2 className="h-4 w-4"/>, action: () => deleteFolder(folder.id), danger: true }
                            ]} />
                        </div>
                      </div>
                      <div className="px-4 mt-1 mb-2">
                         <div className="h-1 w-full bg-stone-100 rounded-full overflow-hidden">
                           <div className={`h-full transition-all duration-500 ${progress === 100 ? 'bg-emerald-500' : 'bg-amber-400'}`} style={{ width: `${progress}%` }} />
                         </div>
                      </div>

                      {isActiveFolder && (
                        <div className="ml-6 pl-3 border-l-2 border-emerald-100 space-y-1 mb-4">

                            const isActiveList = activeListId === list.id;
                            return (
                              <div key={list.id} className={`flex items-center justify-between px-3 py-2 rounded-lg cursor-pointer transition-colors ${isActiveList ? 'bg-emerald-50 text-emerald-800 font-semibold shadow-sm border border-emerald-100' : 'hover:bg-stone-100 text-stone-600'}`}>
                                <div className="flex items-center gap-2 flex-1 overflow-hidden" onClick={() => { setActiveListId(list.id); if (window.innerWidth < 768) setIsSidebarOpen(false); }}>
                                  <ListTodo className={`h-4 w-4 flex-shrink-0 ${isActiveList ? 'text-emerald-600' : 'text-stone-400'}`} />
                                  <div className="truncate flex-1">{editingId === `list-${list.id}` ? renderInlineInput(`list-${list.id}`) : list.name}</div>
                                </div>
                                <div className="relative shrink-0">
                                  <button onClick={(e) => { e.stopPropagation(); setOpenMenuId(`menu-list-${list.id}`); }} className="p-1 text-stone-400 hover:text-emerald-600 rounded"><MoreVertical className="h-4 w-4" /></button>
                                  <DropdownMenu id={`menu-list-${list.id}`} options={[
                                      { label: 'Umbenennen', icon: <Edit2 className="h-4 w-4"/>, action: () => startEdit(`list-${list.id}`, list.name) },
                                      { separator: true },
                                      { label: 'Verschieben nach...', icon: <ArrowRightLeft className="h-4 w-4"/>, action: () => openTransferModal('move', 'list', list.id) },
                                      { label: 'Kopieren nach...', icon: <CopyIcon className="h-4 w-4"/>, action: () => openTransferModal('copy', 'list', list.id) },
                                      { separator: true },
                                      { label: 'Löschen', icon: <Trash2 className="h-4 w-4"/>, action: () => deleteList(list.id), danger: true }
                                    ]} />
                                </div>
                              </div>
                            )
                          })}
                          <form onSubmit={(e) => addList(e, folder.id)} className="px-3 py-1.5 mt-1">
                            <input type="text" placeholder="+ Neue Kategorie" value={newListNames[folder.id] || ''} onChange={(e) => setNewListNames({ ...newListNames, [folder.id]: e.target.value })} className="w-full bg-transparent text-sm border-b border-dashed border-stone-300 py-1 outline-none focus:border-emerald-500 text-stone-600 placeholder:text-stone-400 transition-colors" />
                          </form>
                        </div>
                      )}
                    </li>
                  );
                })}
              </ul>

              {folders.length === 0 && <div className="text-center p-6 text-stone-400 text-sm">Noch keine Trips in deiner Cloud.</div>}
            </div>

            {/* Feste Form am Boden der Sidebar */}
            <div className="p-4 bg-white border-t border-stone-100 shrink-0">
              <form onSubmit={addFolder}>
                <div className="relative">
                  <input type="text" placeholder="Neuen Trip anlegen..." value={newFolderName} onChange={(e) => setNewFolderName(e.target.value)} className="w-full bg-stone-50 border border-stone-200 rounded-xl py-3 pl-4 pr-10 text-sm focus:ring-2 focus:ring-emerald-500 outline-none transition-all placeholder:text-stone-400" />
                  <button type="submit" className="absolute right-2 top-1/2 -translate-y-1/2 text-emerald-600 hover:text-emerald-800 p-1 bg-white rounded-lg shadow-sm"><Plus className="h-4 w-4" /></button>
                </div>
              </form>
            </div>
          </aside>

          {/* Main Content Pane */}
          <main className="flex-1 flex flex-col h-full overflow-hidden bg-[#f4f7f4]">
            {folders.length === 0 ? (
              <div className="flex-1 flex flex-col items-center justify-center p-8 text-center text-stone-500">
                <Tent className="h-24 w-24 text-emerald-200 mb-6" />
                <h2 className="text-2xl font-bold text-stone-700 mb-2">Willkommen beim CampPacker Cloud</h2>
                <p className="max-w-md mx-auto text-sm mb-8">Deine Cloud-Datenbank ist aktuell noch leer.</p>
                
                <button 
                  onClick={loadDefaultsToCloud} 
                  disabled={isUploading}
                  className="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-6 rounded-xl shadow-lg flex items-center gap-3 transition-all disabled:opacity-50"
                >
                  {isUploading ? <RotateCcw className="h-5 w-5 animate-spin" /> : <Cloud className="h-5 w-5" />}
                  {isUploading ? 'Wird in die Cloud geladen...' : 'Meine Standard-Listen laden'}
                </button>
              </div>
            ) : activeFolder ? (
              <>
                <header className="bg-white pt-6 pb-6 border-b border-stone-200 shadow-sm flex-shrink-0 z-10 px-6">
                  <div className="max-w-3xl mx-auto">
                    <div className="flex flex-wrap items-start justify-between gap-4">
                      <div className="flex-1 min-w-[60%]">
                        <span className="text-emerald-600 font-semibold text-sm tracking-wider uppercase mb-1 flex items-center gap-2">
                          Aktueller Trip
                          {getDaysLeft(activeFolder.date) && (
                             <span className="bg-emerald-100 text-emerald-800 px-2 py-0.5 rounded-full text-xs flex items-center gap-1"><Clock className="h-3 w-3"/> {getDaysLeft(activeFolder.date)}</span>
                          )}
                        </span>
                        <h2 className="text-3xl font-extrabold text-stone-800 flex items-center gap-3">
                          <div className="flex-1 min-w-0" onClick={() => startEdit(`folder-header-${activeFolder.id}`, activeFolder.name)}>
                             {editingId === `folder-header-${activeFolder.id}` ? renderInlineInput(`folder-header-${activeFolder.id}`) : <span className="truncate block cursor-pointer">{activeFolder.name}</span>}
                          </div>
                        </h2>
                        
                        <div className="mt-2 flex items-center gap-2 text-stone-500 text-sm">
                           <CalendarDays className="h-4 w-4" />
                           <input type="date" value={activeFolder.date || ''} onChange={(e) => handleDateChange(activeFolder.id, e.target.value)} className="bg-transparent border-none outline-none text-stone-500 hover:text-emerald-600 cursor-pointer p-0 m-0 font-medium" />
                        </div>
                      </div>
                      {getFolderProgress(activeFolder.id) > 0 && (
                        <button onClick={() => reactivateAllInFolder(activeFolder.id)} className="text-sm font-medium flex items-center gap-2 text-stone-500 hover:text-stone-800 bg-stone-100 hover:bg-stone-200 px-4 py-2 rounded-xl transition-colors shadow-sm">
                           <RotateCcw className="h-4 w-4" /> Reaktivieren
                        </button>
                      )}
                    </div>
                  </div>
                </header>

                <div className="flex-1 overflow-y-auto p-4 md:p-6 lg:p-8">
                  <div className="max-w-3xl mx-auto">
                    {activeList ? (
                      <div className="bg-white rounded-2xl shadow-sm border border-stone-100 p-4 md:p-8 mb-24">
                        <div className="flex items-center gap-3 mb-6 pb-4 border-b border-stone-100">
                          <div className="bg-emerald-100 p-2 rounded-lg text-emerald-600"><ListTodo className="h-6 w-6" /></div>
                          <h3 className="text-2xl font-bold text-stone-800 flex-1 cursor-pointer" onClick={() => startEdit(`list-header-${activeList.id}`, activeList.name)}>
                             {editingId === `list-header-${activeList.id}` ? renderInlineInput(`list-header-${activeList.id}`) : activeList.name}
                          </h3>
                          {(openItems.length > 0 || doneItems.length > 0) && (
                            <button onClick={() => { setIsBulkMode(!isBulkMode); setSelectedItemIds([]); }} className={`text-sm px-3 py-1.5 rounded-lg flex items-center gap-2 transition-colors border ${isBulkMode ? 'bg-emerald-100 text-emerald-800 border-emerald-200' : 'bg-white text-stone-500 border-stone-200 hover:bg-stone-50'}`}>
                              <Edit2 className="h-4 w-4"/> {isBulkMode ? 'Fertig' : 'Mehrere bearbeiten'}
                            </button>
                          )}
                        </div>

                        {!isBulkMode && (
                          <form onSubmit={(e) => addItem(e, activeList.id)} className="mb-8">
                            <div className="relative shadow-sm rounded-xl">
                              <input type="text" placeholder={`Was brauchst du für "${activeList.name}"?`} value={newItemNames[activeList.id] || ''} onChange={(e) => setNewItemNames({ ...newItemNames, [activeList.id]: e.target.value })} className="w-full bg-stone-50 border border-stone-200 rounded-xl py-3 pl-4 pr-12 text-sm focus:bg-white focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all placeholder:text-stone-500" />
                              <button type="submit" className="absolute right-2 top-1/2 -translate-y-1/2 text-white bg-emerald-500 hover:bg-emerald-600 p-1.5 rounded-lg transition-colors"><Plus className="h-5 w-5" /></button>
                            </div>
                          </form>
                        )}

                        <ul className="space-y-1 mb-8">
                          {openItems.map(item => (
                            <li key={item.id} className="flex items-center justify-between p-2 hover:bg-emerald-50/50 rounded-xl transition-colors border border-transparent hover:border-emerald-100 cursor-pointer" onClick={() => toggleItem(item.id)}>
                              <div className="flex items-center gap-3 flex-1 min-w-0">
                                <span className="flex-shrink-0 text-stone-300 transition-colors">
                                  {isBulkMode ? (
                                    <div className={`w-5 h-5 rounded border flex items-center justify-center ${selectedItemIds.includes(item.id) ? 'bg-emerald-500 border-emerald-500' : 'border-stone-300'}`}>
                                      {selectedItemIds.includes(item.id) && <Check className="h-4 w-4 text-white" />}
                                    </div>
                                  ) : (<Square className="h-6 w-6 hover:text-emerald-500" />)}
                                </span>
                                <div className="flex-1 text-stone-700 font-medium text-base truncate">{editingId === `item-${item.id}` ? renderInlineInput(`item-${item.id}`) : item.name}</div>
                              </div>
                              {!isBulkMode && (
                                <div className="relative pl-2 shrink-0">
                                  <button onClick={(e) => { e.stopPropagation(); setOpenMenuId(`menu-item-${item.id}`); }} className="p-1.5 text-stone-400 hover:text-emerald-600 rounded-md hover:bg-stone-100"><MoreVertical className="h-5 w-5" /></button>
                                  <DropdownMenu id={`menu-item-${item.id}`} options={[
                                      { label: 'Umbenennen', icon: <Edit2 className="h-4 w-4"/>, action: () => startEdit(`item-${item.id}`, item.name) },
                                      { separator: true },
                                      { label: 'Verschieben nach...', icon: <ArrowRightLeft className="h-4 w-4"/>, action: () => openTransferModal('move', 'item', item.id) },
                                      { label: 'Kopieren nach...', icon: <CopyIcon className="h-4 w-4"/>, action: () => openTransferModal('copy', 'item', item.id) },
                                      { separator: true },
                                      { label: 'Löschen', icon: <Trash2 className="h-4 w-4"/>, action: () => deleteItem(item.id), danger: true }
                                    ]} />
                                </div>
                              )}
                            </li>
                          ))}
                          {openItems.length === 0 && doneItems.length === 0 && (<div className="text-center py-10 text-stone-400">Keine Utensilien vorhanden.</div>)}
                        </ul>

                        {doneItems.length > 0 && (
                          <div className="mt-8 pt-6 border-t border-stone-100">
                            <h4 className="text-xs font-bold text-stone-400 uppercase tracking-wider mb-4 px-2">Erledigt ({doneItems.length})</h4>
                            <ul className="space-y-1 opacity-60 hover:opacity-100 transition-opacity duration-300">
                              {doneItems.map(item => (
                                 <li key={item.id} className="flex items-center justify-between p-2 hover:bg-stone-50 rounded-xl transition-colors cursor-pointer" onClick={() => toggleItem(item.id)}>
                                   <div className="flex items-center gap-3 flex-1 min-w-0">
                                     <span className="flex-shrink-0">
                                       {isBulkMode ? (
                                         <div className={`w-5 h-5 rounded border flex items-center justify-center ${selectedItemIds.includes(item.id) ? 'bg-emerald-500 border-emerald-500' : 'border-stone-300'}`}>
                                           {selectedItemIds.includes(item.id) && <Check className="h-4 w-4 text-white" />}
                                         </div>
                                       ) : (<CheckSquare className="h-6 w-6 text-emerald-500" />)}

                                     <div className="flex-1 text-stone-500 line-through text-base truncate">{editingId === `item-${item.id}` ? renderInlineInput(`item-${item.id}`) : item.name}</div>

                                       <DropdownMenu id={`menu-item-done-${item.id}`} options={[
                                           { label: 'Umbenennen', icon: <Edit2 className="h-4 w-4"/>, action: () => startEdit(`item-${item.id}`, item.name) },

                                           { label: 'Verschieben nach...', icon: <ArrowRightLeft className="h-4 w-4"/>, action: () => openTransferModal('move', 'item', item.id) },
                                           { label: 'Kopieren nach...', icon: <CopyIcon className="h-4 w-4"/>, action: () => openTransferModal('copy', 'item', item.id) },
                                           { separator: true },
                                           { label: 'Löschen', icon: <Trash2 className="h-4 w-4"/>, action: () => deleteItem(item.id), danger: true }
                                         ]} />
                                     </div>
                                   )}
                                 </li>
                              ))}
                            </ul>
                          </div>

                      </div>
                    ) : (
                      <div className="text-center p-12 bg-white rounded-2xl border border-dashed border-stone-200">
                        <Folder className="h-16 w-16 text-emerald-100 mx-auto mb-4" />
                        <h3 className="text-lg font-bold text-stone-700 mb-2">Keine Kategorie ausgewählt</h3>
                      </div>

                  </div>
                </div>
                
                {isBulkMode && selectedItemIds.length > 0 && (

                     <button onClick={() => openTransferModal('move', 'bulk-items', selectedItemIds)} className="flex items-center gap-2 px-4 py-2 bg-stone-100 hover:bg-stone-200 text-stone-700 rounded-xl font-medium transition-colors"><ArrowRightLeft className="h-4 w-4"/> Verschieben ({selectedItemIds.length})</button>

                     <button onClick={executeBulkDelete} className="flex items-center gap-2 px-4 py-2 bg-red-50 hover:bg-red-100 text-red-600 rounded-xl font-medium transition-colors"><Trash2 className="h-4 w-4"/> Löschen</button>
                  </div>
                )}
              </>
            ) : (
              <div className="flex-1 flex flex-col items-center justify-center p-8 text-center text-stone-500">
                <Tent className="h-24 w-24 text-emerald-200 mb-6" />
                <h2 className="text-2xl font-bold text-stone-700 mb-2">Willkommen beim CampPacker</h2>
                <p className="max-w-md mx-auto text-sm">Lege links einen neuen Trip an, um zu starten.</p>
              </div>
            )}
          </main>

          {/* Dialoge & Modals */}
          {confirmDialog.isOpen && (
            <div className="fixed inset-0 bg-stone-900/60 z-50 flex items-center justify-center p-4" onClick={closeConfirm}>
              <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden transform transition-all" onClick={e => e.stopPropagation()}>
                <div className="p-6">
                  <div className="flex items-center gap-3 text-emerald-600 mb-4"><AlertTriangle className="h-6 w-6 text-amber-500" /><h3 className="text-lg font-bold text-stone-800">Bestätigen</h3></div>
                  <p className="text-stone-600 mb-6">{confirmDialog.message}</p>
                  <div className="flex justify-end gap-3">
                    <button onClick={closeConfirm} className="px-4 py-2 text-stone-500 font-medium hover:bg-stone-100 rounded-xl transition-colors">Abbrechen</button>
                    <button onClick={() => { if(confirmDialog.onConfirm) confirmDialog.onConfirm(); closeConfirm(); }} className="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white font-medium rounded-xl transition-colors">Ja, ausführen</button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {transferModal.isOpen && (
            <div className="fixed inset-0 bg-stone-900/60 z-50 flex items-center justify-center p-4" onClick={() => setTransferModal({isOpen: false})}>
              <div className="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden" onClick={e => e.stopPropagation()}>
                <div className="p-6 border-b border-stone-100"><h3 className="text-xl font-bold text-stone-800">{transferModal.action === 'move' ? 'Verschieben nach...' : 'Kopieren nach...'}</h3></div>
                <div className="p-6 space-y-4">
                  <div>
                    <label className="block text-sm font-semibold text-stone-500 mb-2">Ziel-Trip</label>
                    <select value={targetFolderId} onChange={(e) => { setTargetFolderId(e.target.value); const folderLists = lists.filter(l => l.folderId === e.target.value); setTargetListId(folderLists.length > 0 ? folderLists[0].id : ''); }} className="w-full bg-stone-50 border border-stone-200 rounded-xl p-3 outline-none focus:border-emerald-500">
                      <option value="" disabled>Bitte wählen...</option>{folders.map(f => <option key={f.id} value={f.id}>{f.name}</option>)}
                    </select>
                  </div>
                  {(transferModal.sourceType === 'item' || transferModal.sourceType === 'bulk-items') && targetFolderId && (
                    <div>
                      <label className="block text-sm font-semibold text-stone-500 mb-2">Ziel-Kategorie</label>
                      <select value={targetListId} onChange={(e) => setTargetListId(e.target.value)} className="w-full bg-stone-50 border border-stone-200 rounded-xl p-3 outline-none focus:border-emerald-500">
                        <option value="" disabled>Bitte wählen...</option>{lists.filter(l => l.folderId === targetFolderId).map(l => ( <option key={l.id} value={l.id}>{l.name}</option> ))}
                      </select>
                    </div>
                  )}
                </div>
                <div className="p-4 bg-stone-50 flex justify-end gap-3 border-t border-stone-100">
                  <button onClick={() => setTransferModal({isOpen: false})} className="px-4 py-2 text-stone-500 font-medium hover:bg-stone-200 rounded-xl transition-colors">Abbrechen</button>
                  <button onClick={executeTransfer} disabled={transferModal.sourceType !== 'list' && !targetListId} className="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white font-medium rounded-xl transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2">Ausführen</button>
                </div>
              </div>
            </div>
          )}
          {isSidebarOpen && <div className="fixed inset-0 bg-stone-900/50 z-20 md:hidden" onClick={() => setIsSidebarOpen(false)} />}
        </div>
      );
    }

    const rootElement = document.getElementById("root");
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>

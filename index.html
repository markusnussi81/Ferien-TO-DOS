<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">

  <script type="importmap">
    {

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { 
      background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 50%, #fef08a 100%); 
      margin: 0; padding: 0; font-family: 'Inter', sans-serif; overflow: hidden; 
    }
    
    #splash {
      position: fixed; inset: 0; background: linear-gradient(135deg, #4c1d95 0%, #6d28d9 50%, #d946ef 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: white; z-index: 9999;
    }
    .splash-icon { animation: checkPop 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }
    .splash-title { animation: slideUpOpen 0.6s ease-out 0.2s both; }
    .splash-version { animation: slideUpOpen 0.6s ease-out 0.3s both; }
    .splash-loader { animation: slideUpOpen 0.6s ease-out 0.5s both; margin-top: 3rem; }
    
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    @keyframes checkPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); color: #8b5cf6; }
      100% { transform: scale(1); }
    }
    .animate-check { animation: checkPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    
    @keyframes slideUpOpen {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .animate-slide-up-open { animation: slideUpOpen 0.3s ease-out forwards; }

    @keyframes dropDown {
      0% { opacity: 0; transform: translateY(-50px) scale(0.95); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    .animate-drop-down { animation: dropDown 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

    @keyframes slideIn {
      0% { opacity: 0; transform: translateX(20px); }
      100% { opacity: 1; transform: translateX(0); }
    }
    .animate-slide-in { animation: slideIn 0.3s ease-out forwards; }

    /* --- DER iOS KALENDER HACK (Kugelsicher) --- */
    .date-wrapper { position: relative; display: flex; align-items: center; overflow: hidden; }
    .date-input-native {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 10;
      -webkit-appearance: none; appearance: none; background: transparent; border: none;
    }
    .date-input-native::-webkit-calendar-picker-indicator {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      width: 100%; height: 100%; margin: 0; padding: 0; opacity: 0; cursor: pointer;
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #64748b; }
  </style>
</head>
<body>
  <div id="root">
    <div id="splash">
      <svg class="splash-icon w-24 h-24 mb-6 text-fuchsia-200 drop-shadow-xl" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 20 10 4"/><path d="m5 20 9-16"/><path d="M3 20h18"/><path d="m12 15-3 5"/><path d="m12 15 3 5"/></svg>
      <h1 class="splash-title text-4xl md:text-5xl font-extrabold tracking-tight drop-shadow-md mb-3">Holiday Planer</h1>
      <span class="splash-version text-xs font-mono bg-white/20 px-2.5 py-1 rounded-md backdrop-blur-sm shadow-inner font-bold">v1.6.5</span>
      <div class="splash-loader flex flex-col items-center gap-3">
        <div class="w-8 h-8 border-4 border-white/20 border-t-white rounded-full animate-spin"></div>
        <div class="text-[10px] font-extrabold text-white/80 tracking-widest uppercase">App wird gestartet...</div>
      </div>
    </div>
  </div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo } from "react";
    import { createRoot } from "react-dom/client";
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, collection, doc, setDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const IconWrapper = ({ className = "h-6 w-6", children, ...props }) => (

    const Tent = (p) => <IconWrapper {...p}><path d="M19 20 10 4"/><path d="m5 20 9-16"/><path d="M3 20h18"/><path d="m12 15-3 5"/><path d="m12 15 3 5"/></IconWrapper>;

    const Trash2 = (p) => <IconWrapper {...p}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></IconWrapper>;
    const CheckSquare = (p) => <IconWrapper {...p}><rect width="18" height="18" x="3" y="3" rx="2"/><path d="m9 12 2 2 4-4"/></IconWrapper>;

    const X = (p) => <IconWrapper {...p}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></IconWrapper>;
    const MapIcon = (p) => <IconWrapper {...p}><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" x2="9" y1="3" y2="18"/><line x1="15" x2="15" y1="6" y2="21"/></IconWrapper>;
    const TreePine = (p) => <IconWrapper {...p}><path d="m17 14 3 3.3a1 1 0 0 1-.7 1.7H4.7a1 1 0 0 1-.7-1.7L7 14h-.3a1 1 0 0 1-.7-1.7L9 9h-.2A1 1 0 0 1 8 7.3L12 3l4 4.3a1 1 0 0 1-.8 1.7H15l3 3.3a1 1 0 0 1-.7 1.7H17Z"/><path d="M12 22v-3"/></IconWrapper>;
    const Check = (p) => <IconWrapper {...p}><path d="M20 6 9 17l-5-5"/></IconWrapper>;
    const RotateCcw = (p) => <IconWrapper {...p}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></IconWrapper>;
    const MoreVertical = (p) => <IconWrapper {...p}><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></IconWrapper>;
    const CalendarDays = (p) => <IconWrapper {...p}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/></IconWrapper>;
    const CopyIcon = (p) => <IconWrapper {...p}><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></IconWrapper>;
    const ArrowRightLeft = (p) => <IconWrapper {...p}><path d="m16 3 4 4-4 4"/><path d="M20 7H4"/><path d="m8 21-4-4 4-4"/><path d="M4 17h16"/></IconWrapper>;
    const Edit2 = (p) => <IconWrapper {...p}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></IconWrapper>;
    const AlertTriangle = (p) => <IconWrapper {...p}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></IconWrapper>;
    const Cloud = (p) => <IconWrapper {...p}><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></IconWrapper>;
    const ArrowUpDown = (p) => <IconWrapper {...p}><path d="m21 16-4 4-4-4"/><path d="M17 20V4"/><path d="m3 8 4-4 4 4"/><path d="M7 4v16"/></IconWrapper>;
    const MapPin = (p) => <IconWrapper {...p}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></IconWrapper>;
    const Users = (p) => <IconWrapper {...p}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></IconWrapper>;
    const ChevronDown = (p) => <IconWrapper {...p}><polyline points="6 9 12 15 18 9"/></IconWrapper>;
    const ChevronUp = (p) => <IconWrapper {...p}><polyline points="18 15 12 9 6 15"/></IconWrapper>;
    const Settings = (p) => <IconWrapper {...p}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></IconWrapper>;
    const Star = (p) => <IconWrapper {...p}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></IconWrapper>;

    const myFirebaseConfig = {
      apiKey: "AIzaSyBoA1ni-vhIDNlTFhibcagIOJETQD1tYh8",
      authDomain: "camppacker-d27e4.firebaseapp.com",
      projectId: "camppacker-d27e4",
      storageBucket: "camppacker-d27e4.firebasestorage.app",
      messagingSenderId: "469166548777",
      appId: "1:469166548777:web:fa9644ad26a6db99d0f938"
    };

    const app = initializeApp(myFirebaseConfig);
    const db = getFirestore(app);
    const appId = "camppacker-app-v1-2"; 

    const getCol = (name) => collection(db, 'artifacts', appId, 'public', 'data', name);
    const getDocRef = (name, id) => doc(db, 'artifacts', appId, 'public', 'data', name, id);

    // SMARTE MENGEN-ERKENNUNG
    const parseItemInput = (input) => {
      let quantity = 1;
      let name = input.trim();
      
      const regexSpace = /(?:^|\s)(\d+)(?:x|stk\.?)?(?:\s|$)/i;
      const matchSpace = name.match(regexSpace);
      
      if (matchSpace) {
        quantity = parseInt(matchSpace[1], 10);
        name = name.replace(matchSpace[0], ' ').trim();
      } else {
        const regexStart = /^(\d+)(?:x|stk\.?)(.*)/i;
        const matchStart = name.match(regexStart);
        if (matchStart) {
          quantity = parseInt(matchStart[1], 10);
          name = matchStart[2].trim();
        } else {
          const regexEnd = /(.*?)(\d+)(?:x|stk\.?)$/i;
          const matchEnd = name.match(regexEnd);
          if (matchEnd) {
            quantity = parseInt(matchEnd[2], 10);
            name = matchEnd[1].trim();
          }
        }
      }
      return { quantity, name: name || 'Unbekannt' };
    };

    const EMOJI_OPTIONS = ['📋','💊','🍳','🔌','🪥','👕','⛺','🏖️','🛌','🛂','🛠️','🐕','🚴','🚗','🎒','🧸','📷','🔦','🧴','🧻','🍺','🍷','🥪','🔥','❄️','🌧️','🚿','🏂','🧗','⛷️','⚽','🍼','👶','🧩','💻','📱','🔋','🎧','💳','💵','🎫','🩹','🚑','💄','🧼','🧰','⛽','🧂','☕','🥣','🍽️'];

    const getCategoryEmoji = (name) => {
      if(!name) return '📋';
      const lower = name.toLowerCase();
      if (lower.includes('med') || lower.includes('apotheke')) return '💊';
      if (lower.includes('küch') || lower.includes('kochen') || lower.includes('ess') || lower.includes('nahrung')) return '🍳';
      if (lower.includes('elektronik') || lower.includes('technik') || lower.includes('kabel')) return '🔌';
      if (lower.includes('bad') || lower.includes('hygien') || lower.includes('wasch')) return '🪥';
      if (lower.includes('kleid') || lower.includes('anzieh') || lower.includes('wäs') || lower.includes('hose')) return '👕';
      if (lower.includes('wohnwagen') || lower.includes('zelt') || lower.includes('camp')) return '⛺';
      if (lower.includes('strand') || lower.includes('meer') || lower.includes('bade')) return '🏖️';
      if (lower.includes('schlaf') || lower.includes('nacht') || lower.includes('bett')) return '🛌';
      if (lower.includes('dok') || lower.includes('reise') || lower.includes('papier')) return '🛂';
      if (lower.includes('werkzeug') || lower.includes('rep') || lower.includes('3d') || lower.includes('druck')) return '🛠️';
      if (lower.includes('tier') || lower.includes('hund') || lower.includes('cosmo') || lower.includes('katze')) return '🐕';
      return '📋';
    };

    function App() {
      const [folders, setFolders] = useState([]);
      const [lists, setLists] = useState([]);
      const [items, setItems] = useState([]);
      
      const [firebaseLoaded, setFirebaseLoaded] = useState(false);
      const [splashMinTime, setSplashMinTime] = useState(false);
      
      const [animatingItems, setAnimatingItems] = useState({});

      const [activeFolderId, setActiveFolderId] = useState(null);
      const [activeListId, setActiveListId] = useState(null);
      const [isSidebarOpen, setIsSidebarOpen] = useState(false);
      const [appTitle, setAppTitle] = useState('Holiday Planer');
      
      const [editingId, setEditingId] = useState(null);
      const [editValue, setEditValue] = useState('');
      const [openMenuId, setOpenMenuId] = useState(null);
      
      const [isBulkMode, setIsBulkMode] = useState(false);
      const [selectedItemIds, setSelectedItemIds] = useState([]);
      
      const [sortMenuOpen, setSortMenuOpen] = useState(false);
      const [sortOption, setSortOption] = useState('prio-desc');

      const [transferModal, setTransferModal] = useState({ isOpen: false, action: null, sourceType: null, sourceId: null });
      const [targetFolderId, setTargetFolderId] = useState('');
      const [targetListId, setTargetListId] = useState('');
      const [confirmDialog, setConfirmDialog] = useState({ isOpen: false, message: '', onConfirm: null });
      const [iconModal, setIconModal] = useState({ isOpen: false, listId: null });
      const [editFolderModal, setEditFolderModal] = useState({ isOpen: false, id: null, name: '', date: '', region: '' });

      const [newFolderName, setNewFolderName] = useState('');
      const [newListNames, setNewListNames] = useState({});
      const [newItemNames, setNewItemNames] = useState({});
      const [showListInputFor, setShowListInputFor] = useState(null);

      const [localRegion, setLocalRegion] = useState('');
      const [weatherCache, setWeatherCache] = useState({});
      
      const [expandedItems, setExpandedItems] = useState({});
      const [subItemModal, setSubItemModal] = useState({ isOpen: false, item: null, subItems: [] });

      const generateId = () => Math.random().toString(36).substr(2, 9);

      // Sichert, dass der Splash Screen mindestens 1,5 Sekunden sichtbar bleibt (App-Feeling)
      useEffect(() => {
        setTimeout(() => setSplashMinTime(true), 1500); 
      }, []);

      useEffect(() => {
        const unsubFolders = onSnapshot(getCol('folders'), 
          (snap) => {
            const loadedFolders = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            setFolders(loadedFolders);
            if (loadedFolders.length > 0 && !activeFolderId) {
              setActiveFolderId(loadedFolders[0].id);
            }
            setFirebaseLoaded(true);
          },
          (err) => { console.error("Fehler Folders:", err); setFirebaseLoaded(true); }
        );

        const unsubLists = onSnapshot(getCol('lists'), (snap) => setLists(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
        const unsubItems = onSnapshot(getCol('items'), (snap) => setItems(snap.docs.map(d => ({ id: d.id, ...d.data() }))));

        return () => { unsubFolders(); unsubLists(); unsubItems(); };
      }, [activeFolderId]);

      useEffect(() => {
        if (activeFolderId) {
          const folderLists = lists.filter(l => l.folderId === activeFolderId);
          if (folderLists.length > 0 && !folderLists.find(l => l.id === activeListId)) {
            setActiveListId(folderLists[0].id);
          } else if (folderLists.length === 0) {
            setActiveListId(null);
          }
          const currentFolder = folders.find(f => f.id === activeFolderId);
          setLocalRegion(currentFolder?.region || '');
        }
      }, [activeFolderId, lists, folders]);

      useEffect(() => {
        const handleClickOutside = () => { setOpenMenuId(null); setSortMenuOpen(false); };
        document.addEventListener('click', handleClickOutside);
        return () => document.removeEventListener('click', handleClickOutside);
      }, []);

      useEffect(() => {
        const fetchWeather = async () => {
           const activeFolder = folders.find(f => f.id === activeFolderId);
           if (!activeFolder || !activeFolder.region) return;
           
           const regionName = activeFolder.region.trim();
           if (!regionName || weatherCache[regionName]) return; 

           setWeatherCache(prev => ({ ...prev, [regionName]: 'loading' }));

           try {
             const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(regionName)}&count=1&language=de`);
             const geoData = await geoRes.json();
             if (!geoData.results || geoData.results.length === 0) {
                 setWeatherCache(prev => ({ ...prev, [regionName]: 'error' })); return;
             }
             const { latitude, longitude } = geoData.results[0];
             const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`);
             const weatherData = await weatherRes.json();

             const temp = Math.round(weatherData.current_weather.temperature);
             const code = weatherData.current_weather.weathercode;
             let emoji = '🌤️';
             if (code === 0) emoji = '☀️';
             else if (code >= 1 && code <= 3) emoji = '⛅';
             else if (code === 45 || code === 48) emoji = '🌫️';
             else if (code >= 51 && code <= 67) emoji = '🌧️';
             else if (code >= 71 && code <= 77) emoji = '❄️';
             else if (code >= 80 && code <= 82) emoji = '🌦️';
             else if (code >= 95 && code <= 99) emoji = '⛈️';

             setWeatherCache(prev => ({ ...prev, [regionName]: { temp, emoji } }));
           } catch (e) {
             setWeatherCache(prev => ({ ...prev, [regionName]: 'error' }));
           }
        };
        fetchWeather();
      }, [activeFolderId, folders, weatherCache]);

      const getDaysLeft = (dateStr) => {
        if (!dateStr) return null;
        const targetDate = new Date(dateStr);
        const today = new Date();
        targetDate.setHours(0,0,0,0);
        today.setHours(0,0,0,0);
        const diffTime = targetDate - today;
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        if (diffDays > 1) return `${diffDays} Tagen`;
        if (diffDays === 1) return `Morgen`;
        if (diffDays === 0) return `Heute`;
        if (diffDays < 0) return `Vorbei`;
        return null;
      };

      const openConfirm = (message, onConfirm) => setConfirmDialog({ isOpen: true, message, onConfirm });
      const closeConfirm = () => setConfirmDialog({ isOpen: false, message: '', onConfirm: null });

      const openFolderSettings = (folder) => {
        setEditFolderModal({ isOpen: true, id: folder.id, name: folder.name || '', date: folder.date || '', region: folder.region || '' });
        setOpenMenuId(null);
      };

      const saveFolderSettings = async () => {
        if (!editFolderModal.name.trim()) return;
        await setDoc(getDocRef('folders', editFolderModal.id), { 
           name: editFolderModal.name.trim(), 
           date: editFolderModal.date, 
           region: editFolderModal.region.trim() 
        }, { merge: true });
        setEditFolderModal({ isOpen: false, id: null, name: '', date: '', region: '' });
      };

      const addFolder = async (e) => {
        e.preventDefault();
        if (!newFolderName.trim()) return;
        const newId = generateId();
        await setDoc(getDocRef('folders', newId), { name: newFolderName.trim(), date: '', region: '' });
        setNewFolderName(''); setActiveFolderId(newId); setActiveListId(null);
      };

      const deleteFolder = (folderId) => {
        openConfirm('Trip und alle Inhalte wirklich löschen?', async () => {
          await deleteDoc(getDocRef('folders', folderId));
          const listsToDelete = lists.filter(l => l.folderId === folderId);
          for (let l of listsToDelete) {
            await deleteDoc(getDocRef('lists', l.id));
            const itemsToDelete = items.filter(i => i.listId === l.id);
            for (let i of itemsToDelete) await deleteDoc(getDocRef('items', i.id));
          }
        });
      };

      const addList = async (e, folderId) => {
        e.preventDefault();
        const name = newListNames[folderId];
        if (!name?.trim()) return;
        const newId = generateId();
        await setDoc(getDocRef('lists', newId), { folderId, name: name.trim() });
        setNewListNames({ ...newListNames, [folderId]: '' }); setActiveListId(newId);
      };

      const deleteList = (listId) => {
        openConfirm('Kategorie wirklich löschen?', async () => {
          await deleteDoc(getDocRef('lists', listId));
          const itemsToDelete = items.filter(i => i.listId === listId);
          for (let item of itemsToDelete) await deleteDoc(getDocRef('items', item.id));
        });
      };

      const addItem = async (e, listId) => {
        e.preventDefault();
        const input = newItemNames[listId];
        if (!input?.trim()) return;
        const { quantity, name } = parseItemInput(input);
        const newId = generateId();
        await setDoc(getDocRef('items', newId), { listId, name: name, quantity: quantity, checkedQuantity: 0, checked: false, priority: false });
        setNewItemNames({ ...newItemNames, [listId]: '' });
      };

      const deleteItem = async (itemId) => await deleteDoc(getDocRef('items', itemId));
      
      const togglePriority = async (itemId) => {
          const targetItem = items.find(i => i.id === itemId);
          if(!targetItem) return;
          await setDoc(getDocRef('items', itemId), { priority: !targetItem.priority }, { merge: true });
      };

      const toggleExpand = (id) => setExpandedItems(prev => ({ ...prev, [id]: !prev[id] }));

      const openSubItemModal = (item) => {
          setSubItemModal({
              isOpen: true,
              item,
              subItems: item.subItems && item.subItems.length > 0 ? [...item.subItems] : [{ id: generateId(), name: '', quantity: item.quantity || 1, checkedQuantity: 0, checked: false }]
          });
          setOpenMenuId(null);
      };

      const saveSubItems = async () => {
          const { item, subItems } = subItemModal;
          const validSubItems = subItems.filter(s => s.name.trim() !== '');
          
          if (validSubItems.length === 0) {
             await setDoc(getDocRef('items', item.id), { 
                 subItems: null,
                 quantity: 1, 
                 checkedQuantity: item.checked ? 1 : 0
             }, { merge: true });
          } else {
             let totalQty = 0; let totalChecked = 0;
             const updatedSubItems = validSubItems.map(s => {
                 const qty = Math.max(1, parseInt(s.quantity) || 1);
                 const checkedQty = s.checkedQuantity !== undefined ? s.checkedQuantity : (s.checked ? qty : 0);
                 const finalCheckedQty = Math.min(qty, checkedQty);
                 totalQty += qty; totalChecked += finalCheckedQty;
                 return { ...s, quantity: qty, checkedQuantity: finalCheckedQty, checked: finalCheckedQty === qty };
             });
             await setDoc(getDocRef('items', item.id), {
                 subItems: updatedSubItems, quantity: totalQty, checkedQuantity: totalChecked, checked: totalQty === totalChecked && totalQty > 0
             }, { merge: true });
          }
          setSubItemModal({ isOpen: false, item: null, subItems: [] });
      };

      const toggleSubItem = async (itemId, subItemId, action = 'toggle') => {
          const parentItem = items.find(i => i.id === itemId);
          if (!parentItem || !parentItem.subItems) return;
          const newSubItems = parentItem.subItems.map(s => {
              if (s.id === subItemId) {
                  let cQty = s.checkedQuantity !== undefined ? s.checkedQuantity : (s.checked ? s.quantity : 0);
                  const mQty = s.quantity || 1;
                  if (action === 'toggle') { 
                      const newChecked = !s.checked; 
                      return { ...s, checkedQuantity: newChecked ? mQty : 0, checked: newChecked }; 
                  } 
                  else if (action === 'increment') cQty = Math.min(mQty, cQty + 1);
                  else if (action === 'decrement') cQty = Math.max(0, cQty - 1);
                  return { ...s, checkedQuantity: cQty, checked: cQty === mQty };
              }
              return s;
          });
          const totalQty = newSubItems.reduce((acc, s) => acc + s.quantity, 0);
          const totalChecked = newSubItems.reduce((acc, s) => acc + s.checkedQuantity, 0);
          await setDoc(getDocRef('items', itemId), { 
              subItems: newSubItems, 
              checkedQuantity: totalChecked, 
              checked: totalQty > 0 && totalChecked === totalQty 
          }, { merge: true });
      };

      const updateItemQuantity = async (itemId, delta) => {
        const targetItem = items.find(i => i.id === itemId);
        if(!targetItem) return;
        
        if (targetItem.subItems && targetItem.subItems.length > 0) {
            return; // SubItems verwalten ihre eigene Menge
        }

        const currentQty = targetItem.quantity || 1;
        const newQty = currentQty + delta;
        
        if (newQty <= 0) {
           openConfirm(`Möchtest du "${targetItem.name}" wirklich löschen?`, async () => {
              await deleteItem(itemId);
           });
           return;
        }
        
        let newCheckedQty = targetItem.checkedQuantity !== undefined ? targetItem.checkedQuantity : (targetItem.checked ? currentQty : 0);
        if (newCheckedQty > newQty) newCheckedQty = newQty;
        const newChecked = newQty > 0 && newCheckedQty === newQty;
        
        await setDoc(getDocRef('items', itemId), { quantity: newQty, checkedQuantity: newCheckedQty, checked: newChecked }, { merge: true });
      };

      const toggleItem = async (itemId, action = 'toggle') => {
        if (isBulkMode && action === 'toggle') {
          setSelectedItemIds(prev => prev.includes(itemId) ? prev.filter(id => id !== itemId) : [...prev, itemId]);
          return;
        } 
        
        const targetItem = items.find(i => i.id === itemId);
        if(!targetItem) return;

        if (action === 'toggle' && targetItem.subItems && targetItem.subItems.length > 0) {
          const newChecked = !targetItem.checked;
          const updatedSubItems = targetItem.subItems.map(s => ({ ...s, checkedQuantity: newChecked ? s.quantity : 0, checked: newChecked }));
          const totalQty = updatedSubItems.reduce((sum, s) => sum + s.quantity, 0);
          const totalChecked = newChecked ? totalQty : 0;
          if (newChecked) { setAnimatingItems(prev => ({ ...prev, [itemId]: true })); setTimeout(() => setAnimatingItems(prev => ({ ...prev, [itemId]: false })), 400); }
          await setDoc(getDocRef('items', itemId), { checked: newChecked, checkedQuantity: totalChecked, subItems: updatedSubItems }, { merge: true });
          return;
        }

        const maxQty = targetItem.quantity || 1;
        let currentQty = targetItem.checkedQuantity !== undefined ? targetItem.checkedQuantity : (targetItem.checked ? maxQty : 0);
        let newChecked = targetItem.checked;

        if (action === 'toggle') {
          newChecked = !targetItem.checked;
          currentQty = newChecked ? maxQty : 0;
          if (newChecked) {
             setAnimatingItems(prev => ({ ...prev, [itemId]: true }));
             setTimeout(() => setAnimatingItems(prev => ({ ...prev, [itemId]: false })), 400);
          }
        } else if (action === 'increment') {
          if (currentQty < maxQty) currentQty++;
          newChecked = (currentQty === maxQty);
        } else if (action === 'decrement') {
          if (currentQty > 0) currentQty--;
          newChecked = (currentQty === maxQty);
        }

        await setDoc(getDocRef('items', itemId), { checked: newChecked, checkedQuantity: currentQty }, { merge: true });
      };

      const startEdit = (id, initialValue) => {
        setEditingId(id); setEditValue(initialValue); setOpenMenuId(null);
      };

      const saveEdit = async () => {
        if (!editingId) return;
        const [type, id] = editingId.split('-');
        if (editValue.trim() !== '') {
          if (type === 'app') setAppTitle(editValue.trim()); 
          else if (type === 'folder' || type === 'folder-header') {
            const folderId = type === 'folder' ? id : editingId.replace('folder-header-', '');
            await setDoc(getDocRef('folders', folderId), { name: editValue.trim() }, { merge: true });
          }
          else if (type === 'list' || type === 'list-header') {
            const listId = type === 'list' ? id : editingId.replace('list-header-', '');
            await setDoc(getDocRef('lists', listId), { name: editValue.trim() }, { merge: true });
          }
          else if (type === 'item') {
            const parsed = parseItemInput(editValue.trim());
            const targetItem = items.find(i => i.id === id);
            if (targetItem) {
               let newQty = parsed.quantity;
               let newCheckedQty = targetItem.checkedQuantity || 0;
               if (targetItem.subItems && targetItem.subItems.length > 0) {
                   newQty = targetItem.quantity;
               } else {
                   if (newCheckedQty > newQty) newCheckedQty = newQty;
               }
               let newChecked = newCheckedQty === newQty;
               await setDoc(getDocRef('items', id), { name: parsed.name, quantity: newQty, checkedQuantity: newCheckedQty, checked: newChecked }, { merge: true });
            }
          }
        }
        setEditingId(null);
      };

      const handleEditKeyDown = (e) => {
        if (e.key === 'Enter') e.target.blur(); 
        if (e.key === 'Escape') setEditingId(null);
      };

      const handleDateChange = async (folderId, newDate) => {
        await setDoc(getDocRef('folders', folderId), { date: newDate }, { merge: true });
      };

      const handleRegionBlur = async (folderId) => {
        const currentFolder = folders.find(f => f.id === folderId);
        if (currentFolder && localRegion !== (currentFolder.region || '')) {
           await setDoc(getDocRef('folders', folderId), { region: localRegion.trim() }, { merge: true });
        }
      };

      const selectEmoji = async (emoji) => {
         if (iconModal.listId) {
             await setDoc(getDocRef('lists', iconModal.listId), { icon: emoji }, { merge: true });
         }
         setIconModal({ isOpen: false, listId: null });
      };

      const reactivateAllInFolder = async (folderId) => {
        const folderListIds = lists.filter(l => l.folderId === folderId).map(l => l.id);
        const itemsToReactivate = items.filter(i => folderListIds.includes(i.listId) && i.checked);
        for (let item of itemsToReactivate) await setDoc(getDocRef('items', item.id), { checked: false, checkedQuantity: 0 }, { merge: true });
      };

      const executeTransfer = async () => {
        const { action, sourceType, sourceId } = transferModal;
        if (sourceType === 'list') {
          const listToProcess = lists.find(l => l.id === sourceId);
          if (action === 'move') {
            await setDoc(getDocRef('lists', sourceId), { folderId: targetFolderId }, { merge: true });
          } else if (action === 'copy') {
            const newListId = generateId();
            await setDoc(getDocRef('lists', newListId), { ...listToProcess, id: undefined, folderId: targetFolderId });
            const itemsToCopy = items.filter(i => i.listId === sourceId);
            for (let item of itemsToCopy) await setDoc(getDocRef('items', generateId()), { ...item, id: undefined, listId: newListId, checked: false, checkedQuantity: 0 }, { merge: true });
          }
        } 
        else if (sourceType === 'item' || sourceType === 'bulk-items') {
          const idsToProcess = Array.isArray(sourceId) ? sourceId : [sourceId];
          if (!targetListId) return;
          if (action === 'move') {
            for (let id of idsToProcess) await setDoc(getDocRef('items', id), { listId: targetListId }, { merge: true });
          } else if (action === 'copy') {
            const itemsToCopy = items.filter(i => idsToProcess.includes(i.id));
            for (let item of itemsToCopy) await setDoc(getDocRef('items', generateId()), { ...item, id: undefined, listId: targetListId, checked: false, checkedQuantity: 0 }, { merge: true });
          }
        }
        setTransferModal({ isOpen: false, action: null, sourceType: null, sourceId: null });
        setIsBulkMode(false); setSelectedItemIds([]);
      };

      const executeBulkDelete = () => {
        openConfirm(`${selectedItemIds.length} Utensilien wirklich löschen?`, async () => {
          for (let id of selectedItemIds) await deleteDoc(getDocRef('items', id));
          setIsBulkMode(false); setSelectedItemIds([]);
        });
      };
      
      const openTransferModal = (action, sourceType, sourceId) => {
        setTargetFolderId(activeFolderId);
        if (sourceType === 'item' || sourceType === 'bulk-items') {
           const availableLists = lists.filter(l => l.folderId === activeFolderId);
           setTargetListId(availableLists.length > 0 ? availableLists[0].id : '');
        } else setTargetListId('');
        setTransferModal({ isOpen: true, action, sourceType, sourceId }); setOpenMenuId(null);
      };

      const renderInlineInput = (id, containerClasses = "flex-1 min-w-0") => (
        <div className={`flex items-center gap-2 ${containerClasses}`}>
          <input autoFocus type="text" value={editValue} onChange={(e) => setEditValue(e.target.value)} onKeyDown={handleEditKeyDown} onBlur={saveEdit} onClick={(e) => e.stopPropagation()} className="bg-white border-2 border-violet-400 rounded-lg px-2 py-1 text-sm text-stone-800 outline-none w-full shadow-inner font-normal" />
        </div>
      );

      const DropdownMenu = ({ id, options }) => {
        if (openMenuId !== id) return null;
        return (
          <div className="absolute right-0 top-full mt-1 w-48 bg-white/95 backdrop-blur-md rounded-xl shadow-xl border border-stone-200 py-1 z-50">
            {options.map((opt, idx) => opt.separator ? (
                <div key={`sep-${idx}`} className="h-px bg-stone-100 my-1 w-full" />
              ) : (
                <button key={opt.label} onClick={(e) => { e.stopPropagation(); opt.action(); setOpenMenuId(null); }} className={`w-full text-left px-4 py-3 md:py-2 text-sm flex items-center gap-2 transition-colors ${opt.danger ? 'text-red-600 hover:bg-red-50' : 'text-stone-700 hover:bg-stone-50'}`}>
                  {opt.icon} {opt.label}
                </button>
            ))}
          </div>
        );
      };

      const getProgressColor = (current, max, isChecked) => {
         if (isChecked) return 'bg-stone-50/80 hover:bg-white border-transparent hover:border-stone-200';
         return 'bg-white hover:border-stone-300 border-stone-100 shadow-sm hover:shadow-md';
      };

      const getFolderStats = (folderId) => {
        const folderLists = lists.filter(l => l.folderId === folderId);
        const listIds = folderLists.map(l => l.id);
        const folderItems = items.filter(i => listIds.includes(i.listId));
        const total = folderItems.length;
        const done = folderItems.filter(i => i.checked).length;
        const progress = total === 0 ? 0 : Math.round((done / total) * 100);
        return { total, done, progress };
      };

      if (!firebaseLoaded || !splashMinTime) return (
        <div id="splash" className="fixed inset-0 bg-gradient-to-br from-violet-900 via-violet-800 to-fuchsia-600 flex flex-col items-center justify-center text-white z-[9999]">
          <Tent className="w-24 h-24 mb-6 text-fuchsia-200 drop-shadow-xl splash-icon" />
          <h1 className="text-4xl md:text-5xl font-extrabold tracking-tight drop-shadow-md mb-3 splash-title">Holiday Planer</h1>
          <span className="text-xs font-mono bg-white/20 px-2.5 py-1 rounded-md backdrop-blur-sm shadow-inner font-bold splash-version">v1.6.5</span>
          <div className="flex flex-col items-center gap-3 mt-12 splash-loader">
            <div className="w-8 h-8 border-4 border-white/20 border-t-white rounded-full animate-spin"></div>
            <div className="text-[10px] font-extrabold text-white/80 tracking-widest uppercase">App wird gestartet...</div>
          </div>
        </div>
      ); 

      const activeFolder = folders.find(f => f.id === activeFolderId);
      const activeLists = lists.filter(l => l.folderId === activeFolderId);
      const activeList = activeLists.find(l => l.id === activeListId) || activeLists[0];
      const currentListItems = items.filter(i => i.listId === activeList?.id);
      
      let sortedCurrentItems = [...currentListItems];
      sortedCurrentItems.sort((a, b) => {
         if (sortOption === 'prio-desc') {
             const aPrio = a.priority ? 1 : 0;
             const bPrio = b.priority ? 1 : 0;
             if (aPrio !== bPrio) return bPrio - aPrio;
             return a.name.localeCompare(b.name);
         }
         if (sortOption === 'alpha-asc') return a.name.localeCompare(b.name);
         if (sortOption === 'alpha-desc') return b.name.localeCompare(a.name);
         if (sortOption === 'qty-asc') return (a.quantity || 1) - (b.quantity || 1);
         if (sortOption === 'qty-desc') return (b.quantity || 1) - (a.quantity || 1);
         return 0;
      });

      const openItems = sortedCurrentItems.filter(i => !i.checked);
      const doneItems = sortedCurrentItems.filter(i => i.checked);
      const activeStats = activeFolder ? getFolderStats(activeFolder.id) : { total: 0, done: 0 };

      const handleSelectAll = () => {
         if (selectedItemIds.length === currentListItems.length) setSelectedItemIds([]); 
         else setSelectedItemIds(currentListItems.map(i => i.id)); 
      };

      return (
        <div className="h-[100dvh] w-full font-sans text-stone-800 flex flex-col md:flex-row overflow-hidden relative">
          
          {/* SIDEBAR */}
          <aside className={`
            ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'} 
            md:translate-x-0 transition-transform duration-300 ease-in-out
            fixed md:static top-0 left-0 h-full w-[85%] md:w-80 
            bg-white/95 backdrop-blur-md border-r border-stone-200 shadow-2xl md:shadow-none z-40 flex flex-col
          `}>
            <div className="p-6 bg-gradient-to-br from-violet-800 to-fuchsia-700 text-white hidden md:flex items-center gap-3 shrink-0 shadow-inner">
              <TreePine className="h-8 w-8 text-violet-200 flex-shrink-0 drop-shadow-md" />
              <div className="min-w-0 flex-1">
                <div className="flex items-center">
                  <h1 className="font-bold text-xl tracking-wide truncate drop-shadow-sm">{appTitle}</h1>
                  <span className="text-[10px] bg-black/20 text-white px-1.5 py-0.5 rounded ml-2 font-mono shrink-0 shadow-inner">v1.6.5</span>
                </div>
                <p className="text-violet-200 text-xs uppercase tracking-wider font-semibold flex items-center gap-1 mt-0.5 opacity-90"><Cloud className="h-3 w-3"/> Cloud Sync</p>
              </div>
            </div>

            {/* Mobile Sidebar Header Offset */}
            <div className="md:hidden pt-[max(2rem,env(safe-area-inset-top))] px-6 pb-2 text-violet-800 font-extrabold text-2xl flex items-center gap-2">
              <Tent className="h-7 w-7" /> Holiday Planer
            </div>

            <div className="flex-1 overflow-y-auto p-3 md:p-4 pb-[calc(6rem+env(safe-area-inset-bottom))]">
              <h2 className="text-[10px] font-extrabold text-stone-400 uppercase tracking-widest mb-3 md:mb-4 px-2">Geplante Reisen</h2>
              <ul className="space-y-3">
                {folders.map(folder => {
                  const stats = getFolderStats(folder.id);
                  const progress = stats.progress;
                  const isActiveFolder = activeFolderId === folder.id;
                  const folderLists = lists.filter(l => l.folderId === folder.id);

                  return (
                    <li key={folder.id}>
                      <div className={`w-full text-left rounded-2xl flex items-center justify-between transition-all duration-300 ${isActiveFolder ? 'bg-gradient-to-r from-violet-50 to-fuchsia-50 border border-violet-100 shadow-sm' : 'hover:bg-stone-50 border border-transparent'}`}>
                        <div onClick={() => { setActiveFolderId(folder.id); if (window.innerWidth < 768 && folderLists.length === 0) setIsSidebarOpen(false); }} className="flex-1 text-left px-4 py-3 flex items-center gap-3 overflow-hidden cursor-pointer">
                          <MapIcon className={`h-5 w-5 flex-shrink-0 transition-colors ${isActiveFolder ? 'text-violet-600' : 'text-stone-400'}`} />
                          <div className={`truncate font-bold flex-1 ${isActiveFolder ? 'text-violet-900' : 'text-stone-600'}`}>
                            {folder.name}
                          </div>
                        </div>
                        <div className="relative pr-2 shrink-0">
                          <button onClick={(e) => { e.stopPropagation(); setOpenMenuId(`menu-folder-${folder.id}`); }} className="p-2 md:p-1.5 text-stone-400 hover:text-violet-600 rounded-lg hover:bg-white/50 transition-colors"><MoreVertical className="h-5 w-5" /></button>
                          <DropdownMenu id={`menu-folder-${folder.id}`} options={[
                              { label: 'Bearbeiten', icon: <Settings className="h-4 w-4"/>, action: () => openFolderSettings(folder) },
                              { separator: true },
                              { label: 'Löschen', icon: <Trash2 className="h-4 w-4"/>, action: () => deleteFolder(folder.id), danger: true }
                            ]} />
                        </div>
                      </div>
                      
                      <div className="px-5 mt-1.5 mb-3">
                         <div className="h-1.5 w-full bg-stone-100 rounded-full overflow-hidden shadow-inner">
                           <div className={`h-full transition-all duration-700 ease-out ${progress === 100 ? 'bg-gradient-to-r from-violet-400 to-fuchsia-400' : 'bg-gradient-to-r from-amber-300 to-orange-400'}`} style={{ width: `${progress}%` }} />
                         </div>
                      </div>

                      {isActiveFolder && (
                        <div className="ml-6 pl-3 border-l-2 border-violet-100/50 mb-6">
                          <div className="space-y-1.5">
                            {folderLists.map(list => {
                              const isActiveList = activeListId === list.id;
                              return (
                                <div key={list.id} className={`group flex items-center justify-between px-3 py-2 rounded-xl cursor-pointer transition-all duration-200 ${isActiveList ? 'bg-white shadow-sm border border-violet-100/50' : 'hover:bg-white/50 text-stone-600'}`}>
                                  <div className="flex items-center gap-2.5 flex-1 overflow-hidden" onClick={() => { setActiveListId(list.id); if (window.innerWidth < 768) setIsSidebarOpen(false); }}>
                                    <span className="text-base flex-shrink-0 grayscale opacity-80 group-hover:grayscale-0 group-hover:opacity-100 transition-all">
                                        {list.icon || getCategoryEmoji(list.name)}
                                    </span>
                                    <div className={`truncate flex-1 font-medium text-sm md:text-sm ${isActiveList ? 'text-violet-800' : 'text-stone-600'}`}>
                                      {editingId === `list-${list.id}` ? renderInlineInput(`list-${list.id}`) : list.name}
                                    </div>
                                  </div>
                                  <div className="relative shrink-0 md:opacity-0 md:group-hover:opacity-100 focus-within:opacity-100 transition-opacity">
                                    <button onClick={(e) => { e.stopPropagation(); setOpenMenuId(`menu-list-${list.id}`); }} className="p-2 md:p-1 text-stone-400 hover:text-violet-600 rounded-md hover:bg-stone-100"><MoreVertical className="h-5 w-5 md:h-4 md:w-4" /></button>
                                    <DropdownMenu id={`menu-list-${list.id}`} options={[
                                        { label: 'Umbenennen', icon: <Edit2 className="h-4 w-4"/>, action: () => startEdit(`list-${list.id}`, list.name) },
                                        { separator: true },
                                        { label: 'Verschieben nach...', icon: <ArrowRightLeft className="h-4 w-4"/>, action: () => openTransferModal('move', 'list', list.id) },
                                        { label: 'Kopieren nach...', icon: <CopyIcon className="h-4 w-4"/>, action: () => openTransferModal('copy', 'list', list.id) },
                                        { separator: true },
                                        { label: 'Löschen', icon: <Trash2 className="h-4 w-4"/>, action: () => deleteList(list.id), danger: true }
                                      ]} />
                                  </div>
                                </div>
                              )
                            })}
                          </div>
                          
                          <div className="px-3 mt-3 mb-2">
                            {showListInputFor === folder.id ? (
                              <form onSubmit={(e) => { addList(e, folder.id); setShowListInputFor(null); }} className="flex items-center gap-1.5 animate-slide-in">
                                <input autoFocus type="text" placeholder="Listenname..." value={newListNames[folder.id] || ''} onChange={(e) => setNewListNames({ ...newListNames, [folder.id]: e.target.value })} className="flex-1 bg-white border border-violet-300 rounded-lg py-1.5 px-2.5 text-sm outline-none focus:ring-2 focus:ring-violet-500/30 text-stone-700 min-w-0" />
                                <button type="submit" className="p-1.5 bg-violet-500 text-white rounded-lg hover:bg-violet-600 shrink-0"><Check className="h-4 w-4"/></button>
                                <button type="button" onClick={() => setShowListInputFor(null)} className="p-1.5 bg-stone-200 text-stone-600 rounded-lg hover:bg-stone-300 shrink-0"><X className="h-4 w-4"/></button>
                              </form>

                                                                  <button onClick={() => toggleSubItem(item.id, sub.id, 'decrement')} disabled={sub.checkedQuantity === 0} className="p-1 md:p-1.5 hover:bg-white rounded-md md:rounded-lg text-stone-500 disabled:opacity-30 active:scale-90 transition-all"><Minus className="w-3.5 h-3.5 md:w-4 md:h-4"/></button>
                                                                  <span className="w-6 md:w-8 text-center text-[10px] md:text-xs font-extrabold text-violet-700">{sub.checkedQuantity}/{sub.quantity}</span>
                                                                  <button onClick={() => toggleSubItem(item.id, sub.id, 'increment')} disabled={sub.checkedQuantity === sub.quantity} className="p-1 md:p-1.5 hover:bg-white rounded-md md:rounded-lg text-stone-500 disabled:opacity-30 active:scale-90 transition-all"><Plus className="w-3.5 h-3.5 md:w-4 md:h-4"/></button>
                                                              </div>
                                                           ) : (
                                                              <span className="text-[10px] md:text-xs font-bold text-stone-500 bg-white border border-stone-200 px-2 py-0.5 rounded-md shadow-sm">{sub.quantity}x</span>
                                                           )}
                                                        </div>
                                                     </li>
                                                   )
                                                })}
                                             </ul>
                                          </div>
                                      )}
                                      
                                      {showProgressBar && !isBulkMode && currentQty > 0 && (
                                         <div className="absolute bottom-0 left-0 w-full h-1.5 bg-stone-100 opacity-80 z-0">
                                            <div className="h-full transition-all duration-500 ease-out" style={{ width: `${progressRatio * 100}%`, backgroundColor: barColor }} />
                                         </div>
                                      )}
                                    </li>
                                  )
                                })}
                                {openItems.length === 0 && doneItems.length === 0 && (<div className="text-center py-12 text-stone-400 font-medium bg-stone-50/50 rounded-2xl border border-dashed border-stone-200">Noch nichts zu packen!</div>)}
                              </ul>

                              {doneItems.length > 0 && (
                                <div className="mt-6 md:mt-10 pt-4 md:pt-6 border-t border-stone-200/50 relative">
                                  <h4 className="text-[10px] font-extrabold text-stone-400 uppercase tracking-widest mb-3 md:mb-4 px-2 flex items-center gap-2">
                                    Erledigt <span className="bg-violet-100 text-violet-700 px-2 py-0.5 rounded-full">{doneItems.length}</span>
                                  </h4>
                                  <ul className="space-y-2 md:space-y-2.5 opacity-80 hover:opacity-100 transition-opacity duration-500">
                                    {doneItems.map(item => {
                                      const maxQty = item.quantity || 1;
                                      const hasSubItems = item.subItems && item.subItems.length > 0;
                                      const isExpanded = expandedItems[item.id];

                                      return (
                                        <li key={`done-${item.id}`} className={`animate-drop-down flex flex-col items-stretch bg-stone-50/80 hover:bg-white rounded-xl md:rounded-2xl transition-all duration-300 border border-transparent hover:border-stone-200 relative overflow-hidden ${openMenuId === 'menu-item-done-'+item.id ? 'z-50 overflow-visible' : 'z-10 overflow-hidden'}`}>
                                          <div 
                                            className={`flex items-center justify-between p-2.5 md:p-3.5 w-full ${hasSubItems ? 'cursor-pointer' : ''}`}
                                            onClick={() => { if (isBulkMode) toggleItem(item.id, 'toggle'); else if (hasSubItems) toggleExpand(item.id); }}
                                          >
                                            <div className="flex items-center gap-3 md:gap-4 flex-1 min-w-0">
                                              <span className="flex-shrink-0 cursor-pointer p-1 -ml-1" onClick={(e) => { e.stopPropagation(); toggleItem(item.id, 'toggle'); }}>
                                                {isBulkMode ? (
                                                  <div className={`w-6 h-6 md:w-7 md:h-7 rounded-full border-2 flex items-center justify-center transition-all duration-200 ${selectedItemIds.includes(item.id) ? 'bg-violet-600 border-violet-600 shadow-md' : 'border-stone-300 bg-stone-100 hover:border-violet-400'}`}>
                                                    {selectedItemIds.includes(item.id) && <Check className="h-4 w-4 md:h-5 md:w-5 text-white" strokeWidth="3" />}
                                                  </div>
                                                ) : (<CheckSquare className="h-6 w-6 md:h-7 md:w-7 text-violet-500" />)}
                                              </span>
                                              <div className="flex-1 flex flex-wrap items-center gap-1.5 md:gap-2 text-stone-500 line-through decoration-violet-300/50 decoration-2 text-xs md:text-sm font-medium leading-tight">
                                                {item.priority && <Star className="w-3.5 h-3.5 text-stone-400 fill-stone-300 shrink-0" />}
                                                <span className="truncate">
                                                  {maxQty > 1 && !hasSubItems ? <span className="font-bold text-violet-600 mr-1">{maxQty}x</span> : null}
                                                  {editingId === `item-${item.id}` ? renderInlineInput(`item-${item.id}`) : item.name}
                                                </span>
                                                {hasSubItems && (
                                                  <span className="bg-stone-200 text-stone-500 px-1.5 py-0.5 rounded md:rounded-md text-[9px] uppercase tracking-wider font-bold shrink-0 no-underline decoration-transparent">
                                                    {item.subItems.length} Pers.
                                                  </span>
                                                )}
                                              </div>
                                            </div>
                                            
                                            {!isBulkMode && (
                                              <div className="flex items-center shrink-0 ml-2">
                                                {hasSubItems && (
                                                    <div className="mr-1 text-stone-400 p-1 bg-stone-100 rounded-lg group-hover:bg-stone-200 group-hover:text-violet-600 transition-colors">
                                                        {isExpanded ? <ChevronUp className="w-5 h-5 md:w-6 md:h-6"/> : <ChevronDown className="w-5 h-5 md:w-6 md:h-6"/>}
                                                    </div>
                                                )}
                                                <div className="relative pl-1 md:pl-2">
                                                  <button onClick={(e) => { e.stopPropagation(); setSortMenuOpen(false); setOpenMenuId(`menu-item-done-${item.id}`); }} className="p-2.5 md:p-2 text-stone-400 hover:text-violet-600 rounded-xl hover:bg-stone-100 transition-colors"><MoreVertical className="h-5 w-5" /></button>
                                                  <DropdownMenu id={`menu-item-done-${item.id}`} options={[
                                                      { label: item.priority ? 'Priorität normal' : 'Priorität hoch', icon: <Star className={`h-4 w-4 ${item.priority ? 'text-stone-400' : 'text-orange-500 fill-orange-500'}`}/>, action: () => togglePriority(item.id) },
                                                      { separator: true },
                                                      { label: 'Personen / Aufteilen', icon: <Users className="h-4 w-4"/>, action: () => openSubItemModal(item) },
                                                      { label: 'Bearbeiten', icon: <Edit2 className="h-4 w-4"/>, action: () => {
                                                          const editStr = maxQty > 1 && !hasSubItems ? `${maxQty}x ${item.name}` : item.name;
                                                          startEdit(`item-${item.id}`, editStr);
                                                      } },
                                                      { separator: true },
                                                      { label: 'Verschieben nach...', icon: <ArrowRightLeft className="h-4 w-4"/>, action: () => openTransferModal('move', 'item', item.id) },
                                                      { label: 'Kopieren nach...', icon: <CopyIcon className="h-4 w-4"/>, action: () => openTransferModal('copy', 'item', item.id) },
                                                      { separator: true },
                                                      { label: 'Löschen', icon: <Trash2 className="h-4 w-4"/>, action: () => deleteItem(item.id), danger: true }
                                                  ]} />
                                                </div>
                                              </div>
                                            )}
                                          </div>

                                          {hasSubItems && isExpanded && !isBulkMode && (
                                              <div className="bg-stone-100/50 border-t border-stone-200/50 p-2 md:p-3 shadow-inner" onClick={e => e.stopPropagation()}>
                                                 <ul className="space-y-1.5">
                                                    {item.subItems.map(sub => {
                                                       const isSubChecked = sub.checked;
                                                       return (
                                                         <li key={sub.id} className={`flex items-center justify-between p-2 md:p-2.5 rounded-xl border transition-colors ${isSubChecked ? 'bg-stone-50 border-transparent opacity-80' : 'bg-white border-stone-200 shadow-sm'}`}>
                                                            <div className="flex items-center gap-3 flex-1 min-w-0">
                                                               <span className="cursor-pointer text-stone-300 hover:text-violet-500 transition-colors shrink-0 p-1 -ml-1" onClick={() => toggleSubItem(item.id, sub.id, 'toggle')}>
                                                                  {isSubChecked ? <CheckSquare className="w-5 h-5 md:w-6 md:h-6 text-violet-500" /> : <Square className="w-5 h-5 md:w-6 md:h-6" />}
                                                               </span>
                                                               <span className={`text-xs md:text-sm font-bold truncate ${isSubChecked ? 'line-through text-stone-400' : 'text-stone-700'}`}>{sub.name}</span>
                                                            </div>
                                                            <div className="shrink-0 ml-2">
                                                               {sub.quantity > 1 ? (
                                                                  <div className="flex items-center gap-1 bg-stone-50 rounded-lg md:rounded-xl p-0.5 md:p-1 border border-stone-200/60 shadow-sm">
                                                                      <button onClick={() => toggleSubItem(item.id, sub.id, 'decrement')} disabled={sub.checkedQuantity === 0} className="p-1 md:p-1.5 hover:bg-white rounded-md md:rounded-lg text-stone-500 disabled:opacity-30 active:scale-90 transition-all"><Minus className="w-3.5 h-3.5 md:w-4 md:h-4"/></button>
                                                                      <span className="w-6 md:w-8 text-center text-[10px] md:text-xs font-extrabold text-violet-700">{sub.checkedQuantity}/{sub.quantity}</span>
                                                                      <button onClick={() => toggleSubItem(item.id, sub.id, 'increment')} disabled={sub.checkedQuantity === sub.quantity} className="p-1 md:p-1.5 hover:bg-white rounded-md md:rounded-lg text-stone-500 disabled:opacity-30 active:scale-90 transition-all"><Plus className="w-3.5 h-3.5 md:w-4 md:h-4"/></button>
                                                                  </div>
                                                               ) : (
                                                                  <span className="text-[10px] md:text-xs font-bold text-stone-400 bg-stone-50 border border-stone-200 px-2 py-0.5 rounded-md shadow-sm">{sub.quantity}x</span>
                                                               )}
                                                            </div>
                                                         </li>
                                                       )
                                                    })}
                                                 </ul>
                                              </div>
                                          )}
                                        </li>
                                      )
                                    })}
                                  </ul>
                                </div>
                              )}
                          </div>
                        </div>
                      ) : (
                        <div className="text-center p-16 bg-white/60 backdrop-blur-md rounded-3xl border border-dashed border-stone-300 shadow-sm mt-8">
                          <Folder className="h-20 w-20 text-violet-200 mx-auto mb-6 drop-shadow-sm" />
                          <h3 className="text-xl font-bold text-stone-700 mb-2">Keine Kategorie ausgewählt</h3>
                          <p className="text-sm text-stone-500">Wähle links eine Liste aus oder erstelle eine neue.</p>
                        </div>
                      )}
                      
                      {/* Abstandshalter, damit man am Handy bis ganz nach unten scrollen kann */}
                      <div className="h-48 md:h-0 w-full shrink-0 pointer-events-none"></div>
                    </div>
                  </div>
                </div>
                
                {isBulkMode && selectedItemIds.length > 0 && (
                  <div className="fixed bottom-[calc(4.5rem+env(safe-area-inset-bottom))] md:bottom-0 left-0 md:left-80 right-0 bg-white/95 backdrop-blur-xl border-t border-stone-200 p-4 shadow-[0_-20px_40px_rgba(0,0,0,0.1)] z-50 flex justify-center gap-3 flex-wrap">
                     <button onClick={() => openTransferModal('move', 'bulk-items', selectedItemIds)} className="flex items-center gap-2 px-5 py-3 md:py-2.5 bg-stone-100 hover:bg-stone-200 text-stone-700 rounded-xl font-bold transition-all shadow-sm hover:shadow"><ArrowRightLeft className="h-4 w-4"/> Verschieben in ({selectedItemIds.length})</button>
                     <button onClick={() => openTransferModal('copy', 'bulk-items', selectedItemIds)} className="flex items-center gap-2 px-5 py-3 md:py-2.5 bg-stone-100 hover:bg-stone-200 text-stone-700 rounded-xl font-bold transition-all shadow-sm hover:shadow"><CopyIcon className="h-4 w-4"/> Kopieren in</button>
                     <button onClick={executeBulkDelete} className="flex items-center gap-2 px-5 py-3 md:py-2.5 bg-red-50 hover:bg-red-100 text-red-600 rounded-xl font-bold transition-all shadow-sm hover:shadow"><Trash2 className="h-4 w-4"/> Löschen</button>
                  </div>
                )}
              </>
            ) : (
              <div className="flex-1 flex flex-col items-center justify-center p-8 text-center text-stone-500 bg-white/50 m-4 rounded-3xl shadow-xl border border-white/60 backdrop-blur-sm">
                <Tent className="h-24 w-24 text-fuchsia-200 mb-6 drop-shadow-md" />
                <h2 className="text-2xl font-bold text-stone-700 mb-2">Willkommen beim Holiday Planer</h2>
                <p className="max-w-md mx-auto text-sm mb-4">Wähle links einen Trip an, um zu starten.</p>
              </div>
            )}
          </main>

          {/* MOBILE BOTTOM NAVIGATION BAR */}
          {!isBulkMode && (
            <div className="md:hidden fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl border-t border-stone-200 z-50 pb-[env(safe-area-inset-bottom)] shadow-[0_-10px_30px_rgba(0,0,0,0.05)] transition-transform duration-300">
              <div className="flex justify-between items-center px-4 py-2">
                <div className="flex items-center gap-2 font-extrabold text-lg text-violet-800 cursor-pointer" onClick={() => setIsSidebarOpen(false)}>
                  <Tent className="h-7 w-7 text-violet-600" /> <span className="truncate">{appTitle}</span>
                </div>
                <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-3 bg-violet-100 text-violet-700 rounded-2xl hover:bg-violet-200 active:scale-95 transition-all shadow-sm">
                  {isSidebarOpen ? <X className="h-6 w-6" /> : <Menu className="h-6 w-6" />}
                </button>
              </div>
            </div>
          )}

          {editFolderModal.isOpen && (
            <div className="fixed inset-0 bg-stone-900/40 backdrop-blur-sm z-[60] flex items-center justify-center p-4 animate-slide-in" onClick={() => setEditFolderModal({isOpen: false, id: null, name: '', date: '', region: ''})}>
              <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden border border-stone-100" onClick={e => e.stopPropagation()}>
                <div className="p-5 md:p-6 border-b border-stone-100/50 bg-stone-50/50 flex justify-between items-center shrink-0">
                  <h3 className="text-lg md:text-xl font-extrabold text-stone-800 flex items-center gap-2"><Settings className="w-5 h-5 text-violet-500"/> Trip bearbeiten</h3>
                  <button onClick={() => setEditFolderModal({isOpen: false, id: null, name: '', date: '', region: ''})} className="p-2 text-stone-400 hover:bg-stone-200 rounded-full transition-colors"><X className="h-5 w-5"/></button>
                </div>
                <div className="p-5 md:p-6 space-y-4">
                  <div>
                    <label className="block text-xs font-bold text-stone-400 uppercase tracking-wider mb-1.5">Name der Reise</label>
                    <input autoFocus type="text" value={editFolderModal.name} onChange={e => setEditFolderModal({...editFolderModal, name: e.target.value})} className="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-violet-500/30 focus:border-violet-400 outline-none transition-all shadow-inner text-stone-800 font-bold" />
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-stone-400 uppercase tracking-wider mb-1.5">Datum (Optional)</label>
                    <div className="relative">
                      <CalendarDays className="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-stone-400" />
                      <input type="date" value={editFolderModal.date} onChange={e => setEditFolderModal({...editFolderModal, date: e.target.value})} className="w-full bg-stone-50 border border-stone-200 rounded-xl pl-10 pr-4 py-3 text-sm focus:ring-2 focus:ring-violet-500/30 focus:border-violet-400 outline-none transition-all shadow-inner text-stone-800" />
                    </div>
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-stone-400 uppercase tracking-wider mb-1.5">Ort fürs Wetter (Optional)</label>
                    <div className="relative">
                      <MapPin className="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-stone-400" />
                      <input type="text" placeholder="z.B. Paris, Berlin..." value={editFolderModal.region} onChange={e => setEditFolderModal({...editFolderModal, region: e.target.value})} className="w-full bg-stone-50 border border-stone-200 rounded-xl pl-10 pr-4 py-3 text-sm focus:ring-2 focus:ring-violet-500/30 focus:border-violet-400 outline-none transition-all shadow-inner text-stone-800" />
                    </div>
                  </div>
                </div>
                <div className="p-4 md:p-5 bg-stone-50/80 flex justify-end gap-3 border-t border-stone-100/50 shrink-0">
                  <button onClick={() => setEditFolderModal({isOpen: false, id: null, name: '', date: '', region: ''})} className="px-4 py-2.5 md:px-5 md:py-3 text-stone-500 font-bold hover:bg-stone-200 rounded-xl transition-colors">Abbrechen</button>
                  <button onClick={saveFolderSettings} className="px-5 py-2.5 md:px-6 md:py-3 bg-violet-600 hover:bg-violet-700 text-white font-bold rounded-xl transition-all shadow-md hover:shadow-lg transform hover:-translate-y-0.5">Speichern</button>
                </div>
              </div>
            </div>
          )}

          {isSidebarOpen && <div className="fixed inset-0 bg-stone-900/30 backdrop-blur-sm z-30 md:hidden" onClick={() => setIsSidebarOpen(false)} />}
        </div>
      );
    }

    const rootElement = document.getElementById("root");
    const root = createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
